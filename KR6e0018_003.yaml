body:
  text: 清涼山大華嚴寺沙門澄觀排定二毗盧遮那品第六文分四初來意毗盧二釋名二釋三宗趣三宗四釋文三初總明本事之時爾時二別顯本事之處三初總明剎海有世二別明一剎此世三的指一方三初總明感應之處三初正明香海諸佛二海出華山其海三山頂之林於其二別彰能感居人三初標主伴二城諸佛二釋主城二初顯處嚴清淨二彰人勝此大三釋伴城二初顯城名居類其城二辨圍繞莊嚴此一三別彰道場嚴事二初辨道場嚴諸佛二蓮華香海其道三別顯時中本事二初總舉劫中多佛諸佛二別彰本事四初逢一切功德山須彌勝雲佛六初總標佛號其第二先瑞熟機二初現瑞熟機三初標現時諸佛二顯瑞相此摩三結瑞意現如二覩瑞機熟其世三正顯佛興二初一處道成二初總明出現爾時二別顯勝德其身二結通廣遍如於四毫光警召五初放光處爾時二主光名其光三眷屬數十佛四照分齊充滿五光勝益二初別釋若有二結釋此約五當機雲集二初通顯諸王雲集致敬時一二別顯諸王雲集儀式二初廣明喜見六初標名辨統諸佛二總辨眷屬二初奪破夫人二縱成或約三威光得益二初舉因總標爾時二列益名體何謂四偈讚如來二初説偈之由爾時二正陳偈讚三初二偈示佛出現世尊二五偈令觀佛德汝觀三三偈引例勸歸觀諸五父王宣告二初宣告所由諸佛二正以偈告三初三集衆勸觀汝應二七偈敕令辨供一切三一偈賫供供佛一切六俱行詣佛爾時二略列諸王復有六廣顯法門五初佛轉法輪時彼二威光獲益二初總是時二別所謂三以偈讚述二初説偈之因爾時二正説偈三初一標益體用我聞二八顯益所見二初七見因一切二一見果我觀三一發願思齊我當四傳化衆生三初明自悟諸佛二明悟他為一三利他益令如五佛加讚勵四初三讚發心得法大果當成爾時二四對劣顯勝進者圓德非諸三二外加內智決證無疑三世四二舉一例餘行者即得大光二波羅蜜善眼莊嚴佛三最勝功德海佛四名稱普聞蓮華眼幢佛二波羅蜜善眼莊嚴佛二初結前生後諸佛二正顯佛興五初滅後佛興彼佛二覩相獲益二初覩相爾時二獲益二初列二初別釋念佛門二初通釋即得二牒釋二初牒經略釋無邊二別示其相三初定見多佛然略二佛有多德二一三無邊勝德三初總明三無二徵釋何者三結歎障無二通釋餘九門即得五三結如是三讚德勸詣二初説偈三初一偈歎希慶遇爾時二七偈歎佛勝德三初三身業佛身二三語業一一三一意業佛神三二偈勸衆同歸汝等二偈益諸佛四眷屬同歸時大五聞經悟入三初佛與説經其佛二當機獲益二初配十地十度彼諸二隨事立名二者三如來讚述二初六讚其已具勝德時彼二四行齊佛因當如佛證汝已三最勝功德海佛六初如來出時諸佛二正明現世彼摩三威光住供時大四佛為説經時彼五威光得益爾時六如來記莂四初四偈顯其具菩提心時彼二四偈上入佛境汝能三一偈示其果相如汝四二偈讚現能利他今此四名稱普聞蓮華眼幢佛四初佛出人中諸佛二天王就供二初明菩薩行進報處天宮是時二明知佛可歸持華往供共諸三如來説經時彼四得益還歸時天如來名號品第七辨身名差別五初來意三初分來如來二會來二會三品來三品二釋名三初釋分名二釋二釋會名二會三釋品名三品三宗趣三初分宗三宗二會宗二初約科經以明宗趣二初遠望二會二近望近望二約別利以明宗趣三初隨品長分科若依二前後鉤鎖科故此三復依四分科亦是三品宗三品四問答三初第一重二初問第四二答答通二第二重二初問問前二答答凡三第三重二初問問何二答五初正答所以以未二躡迹生難若爾三以義釋通然説四出其所以第九五結其深玄是知五釋文三初序分三初標主時處爾時二別顯三事三初別顯説時始成二別顯説處於普三別顯主德二初總妙悟二引別中三輔翼圓滿二初標數揀定與十二歎其勝德普善二請分二初舉人標念時諸二正顯問端二初對前辨異若世二科判經文三初總科有三若唯二辨三次第是則三分二釋文二初有十句直爾疑問二初總顯請意今取二別列所疑開示二四十句引例請問三初十句標彼説意明其有悲分三初行願俱起釋如十二悲智雙流釋三初明菩薩即悲智又成二雙流所為具此三佛種不斷四初三正釋不斷佛種二覆成上義云何三顯三德益智成四結屬有本所陳三二利齊運釋二初總又釋二別二初雙明二利云何二別明利他四初正離二障云何二出離障因以何三出二障相此煩四從後倒收結歸二障二三十句舉彼所説顯其有智二初十句問因二初通釋九句五初正立脫忍説諸二出其所以又以三引教證成故仁四以理證成有義五結成配屬由斯二別釋頂問二初敘昔説三初依梵網經疏三初正敘昔義十頂二以理縱成理亦三以文奪破但彼二第二説二初敘昔有云二難破彼問三第三説二初立四初正立有云二引證又佛三遮難但舉四釋成此為二破二初縱立然復二奪破但標二申今意二初以十忍答七初將十忍答今謂二會釋二名言十三引文為證故十四引例成立亦猶五反以釋成不爾六釋無十難設欲七明闕信問十信二通以四品答若將二二十句問果二初十內德成滿及説二十體相顯著如來三末後一句結以正請願佛三説分三説分二初通辨六會答前所由爾時二別則此品答前所以二初如來現相答二初佛現神通二初釋隨類義二別初正明三義二別二出現形之相二初疑十信謂若二疑十住若疑二結示通局故知二衆海雲集二初對問辨答二初正釋現神二通難文雖二科判釋文三初總科文義十方二別解遠近三初正釋去此二通難為有三約觀心解又隨三依科正釋三初正釋十方今初二六相圓融又十三結釋勸修以前二文殊言説答四初歎衆希奇五初釋文殊説意三初牒問爾時二正釋前衆三總結影響二釋不請告所以何不三釋不入定所以何不四釋無加所以何故五釋歎衆所以歎衆二牒問總歎諸佛三徵歎總釋何以四廣顯難思二初總顯多端諸佛二隨門別顯二總通辨三品答前所由諸佛二別明此品立名所以二初正辨立名所由二初正明立理二初雙標今初二辨立名若就二以義統收雖復二依文正釋四初娑婆之內自有百億三初此之四洲文中二四洲之鄰十界二初正辨十方十諸佛二問答料揀二初問問餘二答三初正釋答此二類顯因此三該通若通三總結娑婆諸佛二娑婆鄰近即百億之外諸佛三類通一切謂盡十方諸佛四釋世界差別之由如世四聖諦品第八辨言教周遍五初來意三初對問辨來四聖二約義辨次既知三辨義相不同上名二釋名二初正釋名二初得名二初解聖二釋二解諦三初雙標二義諦有二雙釋二義言諦三引證二義故瑜二釋名四謂二出體相二初辨性相四初生滅四諦三初正明性相二結屬此約三引證智論二無生四諦三初引經證明涅槃二以義釋經謂逮三以經證成又涅三無量四諦三初牒上立理又二二引文證成故大三會今經文然此四無作四諦三初總明又究二別示四相今了三束歸一諦若苦二屬經結示故斯三宗趣三宗四解妨二初問四解二答二初四諦包含答答以二將權顯實答又為五釋文二初標告爾時二正釋四初娑婆四諦二初別列諦名四初苦聖諦諸佛二集聖諦諸佛三滅聖諦諸佛四道聖諦諸佛二結數辨意諸佛二鄰次十界十初密訓世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子二最勝世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子三離垢世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子四豐益世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子五攝取世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子六饒益世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子七鮮少世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子八歡喜世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子九關鑰世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子十振音世界二初列四初苦諸佛子二集諸佛子三滅諸佛子四道諸佛子二結諸佛子三類通一切二初舉娑婆以類東方諸佛二舉東方以類餘九如東四主伴無窮二初舉此例彼諸佛二以彼例此彼一光明覺品第九光輪窮照分五初來意十初為答前所依果問光明二為廣名號總標多端二為三即説十信之體性故三者四為顯實遍故四顯五現驗故五現六顯總遍故六顯七顯圓遍故七顯八與下經為例故八與九示前神通相故九示十為顯理事無礙令捨執從法十為二釋名二初得名二初開二初正有三重義含四對第二二別示四對之相如來二合六初合二境二合二合二光身智三合二覺知悟四合能所又此五總融上三此三六結成名品雖平二釋名若從三宗趣第三四解疑妨三初具疑難二初問第四二答二初指前決疑答是二為其解釋但前二唯難不疑次有三唯疑不難又疑五釋文二初如來放光爾時二光至分齊二初通料揀三初光照節數照此二料揀非異然非三正顯所以三初明一光頓照唯一二通難隨機三揀濫在佛二別釋文三初五答菩提五初總顯菩提超情二初長行二初照本界染淨等事三初標其分齊二初總以論顯十段二例同餘文長阿二別顯所照三初現人中三初正明百億二引證故唐三會釋又依二現八相百億三現諸天百億三類結明顯其中二現自法普遍之相二初現自本會如此二現新集衆四初總顯悉以二列名其各三剎名是諸四佛名此諸二偈頌二初彰説人三初約文爾時二約義二一三約表三約二正顯偈頌二初一反顯若有二九順釋四初六偈觀佛若有二一偈趣求若於三一偈觀生衆生四一偈了法一中二通顯菩提因果二初長行佛以身光照現事境令衆目覩爾時二偈頌文殊智光讚述事理令衆悟入三初一偈菩提因爾時二五偈菩提果用普見三四偈令物思齊不壞三顯八相菩提二初長行佛以身光照現事境令衆目覩爾時二偈頌文殊智光讚述事理令衆悟入二初一偈標德充滿爾時二九偈別廣調生或有四顯菩提體性二初長行爾時二偈頌三初一偈為菩提體爾時二四偈三德內圓四初歎菩提永絶二我我性二顯解脫般若解脫三歎超絶三科佛非四歎超離根境其性三五偈即體悲用體性五顯菩提之因二初長行爾時二偈頌五初一偈大悲下救業爾時二四偈修智上攀業意常三二偈明內照業觀身四一偈明等觀業等觀五三偈明大用業悉舉二一答威德三四答法性二一答威德二初長行爾時二偈頌二初五法身二初一偈揀迷爾時二四偈示悟如來二五智身二初一偈知解脫智身心二四偈大用自在智意淨三四答法性四初總顯內外包攝德二初長行爾時二偈頌二初五偈歎佛法難思三初三偈直就佛明爾時二一偈對機以辨若有三一偈紂法以明一切二五偈示明入方便於法二方便幹能德二初長行佛以身光照現事境令衆目覩爾時二偈頌文殊智光讚述事理令衆悟入爾時三大悲救攝德二初長行爾時二偈頌三初一偈總標行滿普化爾時二八偈別顯化類不同衆生三一偈總結悲智周遍聞法四因果圓遍德二初長行二初明世界數量爾時二明彼諸界所有皆現其