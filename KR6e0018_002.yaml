body:
  text: 清涼山大華嚴寺沙門澄觀排定二正釋經文三初總結前文上來二依三分略科分為二初總科三分若依二別釋序三初總申科判序中二總指在餘然此三別釋證信三初立序原由初證二立序所以若核三略釋文義二初引二論開合不同若准二料揀通局然信三依四分釋經分為二初總明上來二別釋四初從世主妙嚴品至毗盧遮那品有六品十一卷經文名舉果勸樂生信分二初敘昔就第二辨今二初總科若以二別釋三初教起因緣分十初總顯已聞分二初敘昔解二初合釋信聞二初總明如是二別釋如是二離釋信聞二初釋如是二初通釋二初總明若離二解妨經以二申今去取二初且總許上來二申正義二初總取三義若依二以宗揀之若華二釋我聞三初總明立意二我二略釋我聞次明三解妨重釋二初徵釋我聞二初徵釋我云何二徵釋聞二初總徵此用二別釋三初法相二初正釋若依二解妨雖因二無相若依三法性若約三釋所不聞然何二明去取上皆二標主時處三初釋時二初就一時說一時二感應合說亦可二釋主二初略釋佛者二指廣義見三釋處在摩三別明時分四別顯處嚴五教主難思六衆海雲集七稱揚讚德八座內衆流九天地徵祥十結通無盡二說法儀式三正陳所說分二從如來名號品至如來出現品有三十一品四十一卷經文名修因契果生解分三離世間一品七卷經文名託法進修成行分四入法界一品二十一卷經文名依人證入成德分三別明時二初雙標二時始成二雙釋二時二初明說時三初釋其所以此教二假問徵起初言三略解文義三初不壞前後三初正明時分略為二遮其伏難常恆三會彼論文若爾二順論解釋二順三約實圓融四初正釋三約二立理以應三通妨故祇四引證三初引法界品故法二引十地經此經三會諸教時故諸二釋成佛二初結前總標上顯二別明五教五初小乘教小乘二始教大乘三終教據實四頓教約法五圓教若依四別顯處嚴二初通釋前後第四二別釋器界五初總標列今初二示儀式然此三通妨難然或四科四事然各五釋本文四初地嚴四初總顯地體其地二四地相具德上妙三四地上具嚴摩尼四舉因結用佛神二樹嚴四初總顯高勝其菩二體攝衆德金剛三妙用自在其樹四舉因結用又以三宮殿嚴四初總明分量如來二體相圓備衆色三妙用自在諸莊四舉因顯廣又以四師子座嚴四初總顯形勝其師二體德圓備摩尼三妙用廣大摩尼四佛加廣演復以五教主難思二初彰其大意二初躡前徵起爾時二總以答之謂具二開彰釋文二初總三初當相以辨文分二寄對以釋若揀三結歸就佛我佛二別二初總科智入二別釋十初三業普用二初法分三初意業三初總標文中二別釋二初略釋言前二廣釋二初總標能入之智智即二別明智入之相四初釋二智二智二釋三智言三三釋無礙智境既四釋四智三初總標言四二會釋通緣三通妨四智三總結然上二身業二初總明其身二別釋二初隨相各別遍法身二圓融總攝遍又國三語業其音二喻分二初總明大意譬如二開章別釋三初總顯喻相今有二喻其所喻三初喻意業二初引經總釋以此二隨相別明二初喻二智量智二喻四智二初以前喻喻於鏡平二初別釋喻相二初喻鏡智二初引唯識又大二引當經下經二喻平等二初引唯識平等二引當經故下二總顯喻意是以二以後喻喻後二智四初引唯識二普二引當經二初釋普遍又下二釋隨入云何三結成喻意二初結喻二初結遍入之義是以二結平等隨入虛空二法合二初合遍入虛空二合隨入佛智四總結難思三初明其隨入此猶二例於普遍普遍三總結二喻三世二喻身業次以三喻語業次以三結示有歸以空二威勢超勝三初標舉章門身恆二引論總釋謂隨三牒文別釋二初義引四身言一二別釋十身二初正辨若正二通妨既云三福德深廣三世四隨意受生而恆五相好周圓無邊六願身演法三初標示大意演一二引文證成故下三牒經委釋然經七化身自在二初明廣容一一二釋普遍各現八法身彌綸二初明法性法身身遍二明應化法身依法九智身窮性相之源智入十力持身持自他依正二初三釋力持二初正報三世二依報一切二以三身收朿五初約三身四身上約二出收束所以以諸三揀異權實十身四融國土等身又毛五結歎深妙是知六衆海雲集二初總科第六二別釋十初集意今初二集因第二三辨類第三四定數三初隨相別名第四二會釋多義然此三融通無盡此猶五權實二初通辨權實第五二對前別辨對前六地位二初正明地位第六二對前料揀將此七前後三初正明第七二解妨又從三結成表法二初結成自在然皆二結成交徹又表八有無二初別明三初通明前三第八二別辨第四四約三合解餘六五約二圓融上十九聞不聞三初正明第九二解妨縱不三總結上之十釋文二初總明二初總明同異生第十二釋同異生義云何二別釋二初一同生三初標數辨類有十二列名結數二初列其名號二初彰大意三初標釋無名其名二總辨立名雖得三通其妨難行德二正釋文二初列十同名二初釋總名二初總明料揀先十二別釋普賢三初釋普賢名言普二通其妨難又三結從別稱上雖二釋別名普德二列十異名海月二結略顯廣如是三攝德周圓二初別歎勝德二初二句就緣歎二初前句顯主伴有由二初標列章門此諸二引經別釋故普二後句明長為輔翼後句二就行歎二初敘意二初標章立歎諸波二別釋其文夫大二釋文三初自分因行德三初自利行圓三初諸度行滿略分二十眼明徹慧眼三深定已滿於諸二利他行滿三初正教輪辨才二神通輪具佛三記心輪知衆三證理位極三初證理法二初入法界藏入法二智