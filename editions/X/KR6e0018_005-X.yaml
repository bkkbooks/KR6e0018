body:
  text: 清凉山大華嚴寺沙門澄觀排定十迴向品中文分四初來意十迴二釋名二初得名二初總釋二釋二別釋三初成三迴向然十二開三為十開三三會十歸三前十二釋名若依三宗趣三宗四釋文十初三昧分爾時二加分三初總顯能加二初明佛現入是二明讚善咸稱二辨加所為二初別明所為二初標所成為令二明所作以無二結為所屬所為三正顯加相三初語業勸說以增辨佛子二意業冥加以益智二初正明加相爾時二釋偏加所以何以三身業摩頂以增威爾時三起分金剛四本分二初總顯體相二初按經解釋二初釋本文二初別釋三句三初總標難思告諸二顯難思相二充三釋成難思三所二總顯難思然總二釋體性故收二依論勢釋若取二別示名相四初舉名徵數佛子二標數顯勝佛子三徵數列名五初釋名何等二義相二初別二初前七隨事行第二二後三攝理行後三二通五初總標為三二通二明三之因此三三立三所以二初取三類四初標所以二列謂依三釋一依四結二初結前以斯二例釋二初例三菩提若立二展轉相成又此二通所成又此四融通三相又此五結成融通故此三體性第三四定位三初約五位釋二初約資粮第四二約加行有云二略指前文餘約三約教料揀四初始教上來二終教有說三頓教有言四圓教二初正釋若依二融通然與五行法第五四結數引證佛子五說分六瑞應分七結通分八證成分九偈讚勸修分十校量功德分五說分二初救護一切眾生離眾生相迴向二初長行二初位行三初牒名徵起佛子二依徵廣釋二初所迴善根四初敘古釋佛子二申正義若順三通妨難以是四收古義若以二正明迴向二初明隨相迴向二初總明修善二別顯四初利樂救護三初總標菩薩二別顯我當三總結佛子二受惱救護二初明受惱之相二初法佛子二喻二初大海不變喻譬如二日輪普照喻三初舉喻譬如二合法二初合具德之義菩薩二合非緣不阻不以三徵釋二初徵何以二釋二初喻譬如二合二初總菩薩二別二初以大悲合日不但二以智合日如是二明迴向之相二初辨迴向之心二初緣境廣大上等佛心佛子二悲成利樂下救物心菩薩二明迴向之願二初令成法器佛子二得法圓滿四初遇緣得法又作二成自分德於諸二勝進德圓於諸四明德果滿令一三代苦救護三初總明代苦迴向二初明先救重苦二初見苦興悲佛子二徵以釋成何以二念徧救諸苦二初明救八難苦菩薩二救迷四諦苦二初念苦境又諸二興悲救菩薩二別明代苦迴向二初三明代苦之心三初明一向普枚無自為心復作二眾苦備受無懈怠心二初正明復作二徵釋二初略釋二初徵何以二釋釋云二問答二初問問眾二答三初正明答通二料揀上來三通妨二初問問若二答答此三決志保護無虛妄心二初正明復作二徵釋二初徵何以二釋二初異小乘釋有二異凡夫三初正明不求亦不二徵釋所以何以三結成前義菩薩二後二明迴向之心二初念令彼得樂佛子二念身為保護復作四逈拔救護二初喻佛子二合二初先合獨照菩薩二合前成益修習三總結迴向之益佛子二明離相迴向三依釋結名佛子二位果初迴向缺此科二偈頌乃至十入法界無量迴向二明離相迴向二初辨忘機之智二初正明無私佛子二顯成廣大善根二明大智離相二初正明離相二初會前迴向眾生明入實際二初廣明離相四初離所取相安置二離能取相三初略釋經文不著二引文成證三初引大品故大二光明覺光明三大般若若依三釋三不同然小三離能詮名不著四離妄成智二初彰大意觀一二引釋文文有二雙結二相解一二會前迴向菩提明入實際三初結前生後以如二法喻釋成非即三結成迴向離我二總結成益菩薩二偈頌二初略敘儀意爾時二正陳偈辭二初頌所迴善根二初六偈頌四等不思二二偈半頌六度修行二頌迴向之行二初頌隨相二初頌利樂迴向如是二頌代苦迴向普為二頌離相二初正明離相未曾二頌前成益十方二不壞迴向二初長行二初位行三初牒名徵起佛子二依徵廣釋三初舉所迴善根二初明起堅信佛子二依信種善二初種彼善根佛子二長菩提道令菩二辨迴向之行二初善根迴向二初迴向菩薩二結成菩薩二勝報迴向二初所迴向善根二初牒前生後菩薩二正明供佛二初總標於念二廣顯四初列供事六初雜門以阿二寶座阿僧三經行阿僧四宮殿阿僧五寶樹阿僧六嚴殿其諸二明供佛二初供現佛佛子二供舍利一一三顯供意為令四結分齊如是二顯迴向行三初明迴向之心三初不離大悲如是二離妄契真無有三結前生後諸佛二明迴向之相與諸三迴向行成三初明隨相行成三初牒前離相佛子二正顯本文雖隨三結前生後菩薩二離相行成三初總釋以清二總科於中三別釋別中三雙結無碍菩薩三明迴向所為菩薩三依釋結名佛子二明果位菩薩二偈頌二偈頌三初頌所迴向善根及第一節迴向爾時二頌所成供行復將迴向二初頌所迴向善根一切二頌迴向之行三初迴向之心菩薩二迴向之相一切三迴向行成雖令三五偈頌迴向所為專心三等一切佛迴向二初長行二初位行三初牒名徵起佛子二依徵廣釋二初標舉佛子二廣釋二初顯迴向二初等隨相二初明對善根以將迴向二初迴向善根如是二正顯迴向五初佛二初牒前起後佛子二正顯所願願以二菩薩二初結前生後佛子二正顯十願二初六自利所謂二四利他能令三有善眾生佛子四二乘如為五有惡眾生又願二總攝萬善以將迴向二初總顯迴向三初總佛子二別發起三結悉令二歷事別陳二初顯增長迴向二初別明三初隨染無污迴向佛子二動與道合迴向菩薩三總顯迴向之相二初總明為欲二別顯永離二總結菩薩二顯積集迴向二初別明二初明微細積集二初積集善根佛子二迴向之行咸作二辨長時積集菩薩二總結菩薩二等雜相二明成益菩薩三依釋結名佛子二位果菩薩二偈頌二等離相二初等過去二初舉所等三初標隨相即有離相復作二別顯離相之相二初離妄契真所謂二釋前不著知一三結其無碍如是二顯能等二初牒所等總顯能等如彼二別明能所等相解如二等現未三初牒上所等佛子二總顯能等我今三別顯等相第一二偈頌三初頌位行二初頌總標釋名爾時二頌上廣釋二初頌正明迴向二初對境所生善根迴向二初明所迴善根兼迴向佛樂於諸二頌迴向眾生令得佛樂一切二總攝萬善迴向三初頌增長迴向菩薩二頌積集迴向菩薩三對境善根迴向二初四頌隨相十方二後二離相心不二頌總結成益彼諸二頌位果一心三頌結歎彼第四至一切處迴向二初長行二初位行三初牒名徵起二初釋名四初標能所至佛子二總示其相謂以三引本業證本業四復明能至然準二出體若尅二依徵廣釋三初迴向眾生菩提二初略明三初法佛子二喻譬如三合二初總標願此二別明二初合所至處過去二明能至供願以二廣釋二初約十方明其徧至三初總明供處佛子二別明供養二初供現在佛二初明所供田二初實報田如是二權應田三初現身彼有二說法以至三釋權應法身二明能行供佛子二供住持佛若佛三明迴向心以此二約常隹明其徧至三初以善根迴向供佛二初明所供境復作二顯能供行三初結前生後如是二所成供具三初香蓋願以二華鬘無量三增前數三初正釋如是二增數從無三揀定然一三結成供行以如二以供佛善根迴向眾生二初總顯願令二別顯令一三總願善根普攝迴向二初喻譬如二合二初自利我諸二利他普攝二迴向實際二初總標佛子二別顯三初正顯觀心二初別明四初會事歸理二初總釋不於二別釋初中二理不礙事雖無三理事雙絕若作四理事無礙雖悉二融通上四二明觀成相二初結前生後菩薩二正顯其相二初總知一二別見於三明觀成益菩薩三結歎成益二初明自分二利佛子二辨勝進二利佛子三依釋結名佛子二位果三初牒得時菩薩二願所為得至三明總結佛子二偈頌二偈頌三初迴向眾生及菩提二初頌前略明爾時二頌前廣明三初頌前所至處十方二頌迴向眾生不取三頌普攝迴向普攝二迴向實際未曾三頌成益一切五無盡功德藏迴向二初長行二初明位行三初牒名徵起佛子二依徵廣釋三初明所迴向善根三初開合第二二釋文四初懺悔三初釋名佛子二成益除惡三辨相然懺二禮敬三初釋名禮敬二成益除我三辨相勒那三勸請三初釋名勸請二成益除謗三辨相聲聞四隨喜三初正釋文義三初釋名於去二成益除嫉三辨相然十二重辨成益大品三出多所以此據三料揀三初明次然佛二辨果然禮三揀定約教二明迴向之行二初結前善根二初橫結上來及不可說者菩薩二竪結前來所有善根凡所二正明迴向二初迴向菩提二初明隨相二初正起行願二初迴向淨土二初明眾寶莊嚴二初總標所成悉以二別顯嚴相二初三世土嚴二初別明三初舉過去嚴土二初總明如過二別顯二初明因圓滿二初總明清淨二別顯三初總明初句二引證故佛三出體有云二明事業圓滿一切二舉未來嚴土二初總標盡未二別顯五初分量圓滿盡法二果法圓滿皆從三依持圓滿三初引佛地經無量二正釋經文今文三會佛地經佛地四明主圓滿如來五輔翊圓滿二初總標不可二別釋後未三舉現在嚴土二初總現在二別無量二總結二初總能所嚴如是二別結所嚴所謂二願成彼嚴二初嚴一世界如是二例嚴普周如一二明人寶莊嚴二總攝迴向佛子二結行成益佛子二明離相二初明見實智冥實際佛子二彰離妄德合實際佛子二迴向眾生佛子三結行成德五初成無盡善根德菩薩二成二空智慧德佛子三成境界清淨德佛子四成福智無盡德佛子五成福智超勝德佛子三依釋結名佛子二明位果四初標菩薩二徵何等三釋所謂四結是為二偈頌二明人寶莊嚴三初總願所成佛子二別顯願相二初願德齊二初正顯德二初總明其諸二別顯二初明智圓善能二明體實深入二結德嚴土如是二願業廣四初事業圓滿常作二即乘圓滿得大三無畏圓滿趣薩四任持圓滿二初明能受隨順二明能說知阿三結以嚴剎三初總彰人徧願令二結行德深熏修三別示徧相於一二偈頌二初頌所迴向善根爾時二雙頌前所迴善根及結行成益二初頌二段隨相三初迴向菩提三初頌眾寶莊嚴三世二頌人寶莊嚴有諸三頌總攝迴向未曾二迴向眾生菩薩三結行成益十方二頌二段離相三初頌前菩提離相菩薩二頌眾生離相一切三頌結成離相二初境界清淨德菩薩二二空智慧德了達六隨順堅固一切善根迴向二初長行二初位行三初牒名徵起六初釋其總名佛子二別會前文本分三會引他經又本四別顯得名此約五結會六釋亦可六出其體性即以二依徵廣釋二初明行所依身二初明得位佛子二明具德二初明統領自在德威德二明正報殊倫德菩薩二明依身起行三初明隨相迴向三初總相標列善根迴向三初列所施物四初舉其都數具足二內外料揀於中三四等料揀又前四三施料揀又代二辨所施田其中三顯行依心二初總明佛子二別顯三初彰所攝入所謂二總釋善行言善三隨順善根謂捨二依標廣顯善根迴向二初總相料揀四初總相辨異第二二開合所以然其三辨出法門昔光四總結無量三初引文成多此土二出其本意實則三結示文旨故知二隨文別釋二初總標施行佛子二別顯六十門初施食三初施行所謂二迴向願一三雙結