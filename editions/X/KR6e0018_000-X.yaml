front:
  text: 大方廣佛華嚴經疏鈔序科文釋斯鈔序啟以三門三初題目大方次撰人清涼後本文二初教起源流二初通明諸教四一明如來說經至聖二明菩薩造論大士三縱奪遣妨二初縱法本離言雖忘後奪不礙言說而浩四出示經意二初舉例設教蓋欲後因言悟入窮無後別指當經二初標指斯經後嘆勝不可後鈔興本末二初依經製疏三初晉譯先彰二初旨趣玄微晉譯後賢首得旨賢首二唐翻後闡二初新經罔愽唐翻後刊定迷宗後哲三疏成廣播二初陳謙述不揆後疏遠流通偶溢後請集鈔文四初學徒咨請四初標眾講者二陳詞咸叩三按定大教四謙承親承二冀遠重宣二初慜後垂範後正請希埀三法師承領三初明製鈔意順斯次引古釋成昔人後出意製鈔今為四述作體式三初正顯然繁次謙陳顯此後出理意夫
