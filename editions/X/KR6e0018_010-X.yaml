body:
  text: 清涼山大華嚴寺沙門澄觀述五寂靜音海主夜神寄第五難勝地六初依教趣求爾時二見敬諮問頂禮三稱讚授法二初讚時彼二授二初略標名體善男二廣顯其相三初顯解脫業用二初問善財二答四初答三起何方便二初上求大智心夜神二下化大悲心我發二答一為何事業三初標發是二釋三初治其十蔽二初雙明捨戒所謂二明餘八度若見二得佛功德若見三破其惑障若見三結善男三答四作何觀察二初觀菩薩境界復次二觀佛之勝用三初結前標後善男二正顯十門善男三總結遠近二初標喜成益我見二徵釋所由何以四答二行何境界三初法又善二喻此解三結善男二明解脫所因二初問爾時二答夜神三彰發心久近二初問善財二答二初長行三初餘剎修行二初於佛一剎劫修行五初總標剎海夜神二別彰時處此世三發心得定有佛四略舉九佛此道五結略顯廣善男二於第二劫修行從此二娑婆修行二初舉前三佛然後二顯遇本師二初名體次值二業用二初所入海數得此二所見深細四初剎海中塵見彼二塵中之剎一一三剎中之佛一一四毛孔變化二初通力演說又亦二夜神悟入二初總顯能所悟我得二明重重微細二初總顯十重一一二別顯智用二初總該橫竪一一二別顯所知五初因行知無二地位知無三因作用知無四知果用知無五總結彼諸三結酬其問三初結前善男二顯類及此三勸學善男二偈頌三初誡聽勸修爾時三正明修行二初智行上供我曾二悲心下化老病三結行分齊願盡四謙己推勝善男五指示後友善男六戀德禮辭三初觀心爾時二偈讚四初因友得見我因二寄對顯勝非是三當相顯勝遠離四總顯圓融無邊三身體時善六守護一切城主夜神寄第六現前地六初依教趣求爾時二見敬諮問見彼三稱讚授法二初讚歎發心時彼二正授法界三初總標名體善男二正顯業用三初總明二初彰法施之德為大二顯法施之意佛子二別顯三初釋甚深三初總鏢善男二徵釋何者三結益善男二釋自在又善三釋妙音二初別明善男二總結善男三結益二初別結甚深善男二通結餘二善男三辨法根深二初問時善二答二初辨初劫修二初總舉剎劫夜神二別彰遇佛四初總舉佛處善男二別明初佛六初標舉顯佛其最二父王出家彼佛三惡世過興法欲四滅過弘闡時王五王女得法時有六結會古今善男三略明百佛次有四結略顯廣善男二類多劫修從是四謙己推勝二初謙己知一善男二推勝知多如諸五指示後友三初指示後友善男二偈讚前法二初頌前體用爾時二頌前根深二初頌前初劫三初通頌初後過於二別顯初佛我見三通頌百佛見第二頌類顯於諸三善財得益二初長行敘益爾時二偈頌重顯四初福智超絕觀察二悲智甚深了達三總顯德圓已住四成行入位已生六戀德禮辭時善七開敷樹華主夜神寄第七遠行地六初依教趣求爾時二見敬諮問見其三授己法界四初顯法行分二初安樂眾生行夜神二正明利益行二初總善男二別為慳二立法名善男三明業用二初問善財二答三初總標夜神二略顯云何三廣顯二初徵云何二釋二初總明善男二別顯二初發心二初見發心境善男二見發救心二初雙起慈悲見如二雙運悲智起觀二起行二初別明利益眾生行三初舉行體起如二明本意以是三明周徧菩薩二雜明種種化利行二初觀機善男二修行三初化益起大二化法為說三化意令諸四法根深二初問善財二答二初顯深許說二初長行二初歎深難知四初標深難說夜神二顯不能知一切三揀去能知唯除四徵釋所由何以二承力許說然我二偈頌二初頌歎深四初標深難知爾時二頌不知人非是三頌釋所由佛境四揀去能知生於二頌承力汝於二承力正酬二初長行二初正說四初時處佛興善男二本生處時善男三發心勝緣四初大王治化其中二五濁三災時彼三悲境現前咸來四正明起行二初深起大悲二初一總明爾時二九別明二初一解哀哉二八行三初五悲欲二初三悲解行三初悲不共哀哉二悲無厭哀哉三悲積財哀哉後二悲未得二前門求後報哀哉後門求現報哀哉次二悲有二前門即道差別哀哉後門即界差別哀哉後一悲邪哀哉二廣行大施八初施令彌布作是二施會大敷其堅三施主超倫時彼四施田雲集爾時五施心殷重時王六施願廣深善男七施慧玄微已能八施時均普不簡四發心本事六初發心身德時此二正發大心時寶三正攝受言爾時四女讚王德三初標心淨時寶二發口言二初總顯王德四初未興時損往昔二興世之益大王三翻損成德往昔四依正難思大王二顯王本生四初先王世末王父二王興先相王生三正顯誕生時彼四生後之益寶藏三展身敬爾時五大王述讚時彼六施行攝持王讚二結會善男二偈頌二初能知爾時二結勸我於四謙己推勝善男五指示後友善男六戀德禮辭時善八大願精進力主夜神寄第八不動地六初依教趣求爾時二見敬諮問三初見其體用二初標見所依見彼二別顯身相三初應機攝化身現日二應法成行身現一三離障契理身現了二設敬證入四初設敬陳理時善二發增勝心於善三深證懸同三初標四初人法發是二因果二因三自他三白四染淨四染二釋所謂三結時善四以偈慶讚三初頌德增勝心既獲二頌深證懸同我以三頌荷恩深廣聖者三諮問法要爾時三授己法界二初答解脫之名二初標名夜神二顯用三初內契理事我以二大用無涯而恒三總結深廣四初結所作業念念二結能顯因善男三雙結寂用善男四結成深廣一一二答發心久近二初歎深許說三初標問許說善男二歎法甚深二初法說二初標本性善男二釋妨難隨所二喻明五初皎日隨時善男二日輪現影善男三虛舟運物佛子四太虛無礙佛子五幻化無真善男三結承力說佛子二正答所問二初長行三初善光劫二初最初佛所修證三初古佛出興佛子二先王治化是時三夜神修因三初在家本事十初悲救罪人王有二臣議非理時王三請代因命時彼四臣執令誅時諸五王后哀祈王后六王奪子志王即七太子確救爾時八母請修因爾時九正設施場時都十如來親救六初就戮時臨經半二如來降德時法三敬申禮請爾時四就座談經以佛五廣益當機時彼六太子得法善伏二結會古今四初結自身善男二結大臣佛子三結獄囚佛子四結王屬時勝三出家得法佛子二轉生值佛修行佛子二日光劫三初總標舉次復二列十佛最初三結得法於彼三結時處如於二偈頌四初頌承力許說爾時二頌古佛興世過去三頌先王治化時有四頌夜神修因四初頌在家本事其王二頌出家得法便即三頌事佛一萬於中四頌總結時處三初標舉次於二結會我念三得法我於四謙己推勝善男五指示後友善男六戀德禮辭時善九嵐毗尼林神寄第九善慧地六初依教趣求爾時二見敬諮問見在三授己法界四初顯法義二初長行四初標數歎勝彼神二徵數列名五初約位竪配何等二結前生後然依三通諸位釋若約四結成竪位若定五結成須橫若定三依名釋義十初供養諸佛善男二發菩提心云何三修習觀行云何四淨心照世云何五平等光明云何六生如來家云何七佛力光明云何八觀普智門云何九普現莊嚴云何十入如來地云何四結歎勝益佛子二偈頌爾時二立法名二初牒前所明善男二指前立目善男三明業用二初問善財二答二初依願受生答言二如昔願覩四初降神瑞相經於二出城現光善男三將生神變二初總徵善男二別顯十初集眾息苦善男二卷舒無礙又善三毛現佛因又善四現佛本事又善五行所依身又善六徧明捨行又善七古佛園林又善八今佛宮殿又善九菩薩同類又善十地等光明又善四正覩誕生三初覩外相善男二了內德善男三結周徧善男四辨根源二初問時善二答二初長行六初古世佛興答言二顯昔父母其四三攀樹誕生善男四觀佛得法時有五結會古今善男六結用周徧我從二偈頌四初頌誡聽許說時嵐二頌最初修證過億三頌歷事增修劫中四頌結歎無盡佛子四謙己推勝善男五指示後友善男六戀德禮辭時善十釋女瞿波寄第十法雲地六初依教趣求二初依前修證爾時二趣求後友四初依求詣處漸次二伴友迎讚四初讚行究竟其中二讚進得果我觀三讚進得法我觀四以理釋成何以三善財印述二初印述所說善財二述自所作二初四等攝生四初法聖者二喻聖者三合菩薩四釋二初徵何以二釋二初總明菩薩二別顯二初明不自為不貪二明其所為但見二萬德益物二初為物歸趣聖者二結成益物聖者四神敬增深三初長行申供爾時二以偈讚德二初歎下益眾生行汝今二歎上求無碍行汝以三以身隨逐爾時二見敬諮問三初見二初見依報爾時二見正報見在二敬爾時三問二初陳心作如二正問而未三示己法界四初顯法義二初長行二初讚誡許說時瞿二正顯法義二初帝網智光行善男二承事善友行佛子二偈頌二初頌帝網行爾時二頌承友行菩薩二立法名時釋三明法用二初問善財二答二初顯廣知三初知娑婆二初剎塵劫事二初知世間因果答言二知出世因果二初知佛因果又彼二知佛眾會三初知聲聞亦知二知緣覺有諸三知菩薩亦知二類盡未來際善男二類剎海二初通明如知二別顯所謂三顯毗盧二初因亦念二果得於二釋所以何以四辨法根源二初問爾時二答四初最初一佛二初正顯本緣十初王都時處答言二太子超倫二初具相其王二遊觀爾時三寶女求歸四初具德端嚴時有二白母求事見其三夢覩佛興彼香四女自陳心二初自迷德堪時妙二讚彼求納我今四太子審問三初問其屬緣爾時二審其內過汝不三邀其進喜尊重五女母代答六初總顯勝報爾時二別讚端嚴紺鬟三明其絕倫此女四伎能內滿文字五離非具德婦人六結讚所宜福智六太子重邀二初長行二初自述行深爾時二恐其為障當於二偈頌三初頌其行深爾時二邀其無障汝見三結令審思汝今七女敬順從三初忘苦眷德爾時二希同勝行無量三勸詣如來我曾八太子攝受爾時九母陳慶遂四初標其遂志其母二德行懸同持戒三身語超偷此女四內心蘊德心淨十正共修行十初請佛供養爾時二聞經得法時佛三辭歸白父時彼四王審慶聞爾時五禪位徃觀作如六聞經得益爾時七兼益時會其眾八佛重現通時佛九父王出家時彼十太子紹位爾時二會同古今佛子二中間多佛彼佛三得法之時其最四多劫修瑩二初於一剎塵劫修行二初修行未窮佛子二菩薩難遇佛子二於百剎塵劫修行二初修未知佛子二釋所由二初總何以二別五初見器世間佛子二見智正覺世間又於三見眾生世間又於四見菩薩修行又於五總結不窮佛子四謙己推勝佛子五指示後友二初指後友善男二頌前法三初顯菩薩益爾時二明遠劫前事乃往三德女因緣此後六戀德禮辭爾時大文第二摩耶夫人下十一人明會緣入實相二初文前敘義五初總科自下二料揀然人三解妨二初問摩耶二答豈不四義門又此五總釋初天二隨文正釋二初摩耶夫人一人為總六初依教趣求二初將請觀成三初將詣觀成爾時二別明觀念二初總作是二別隨意三思欲親承如是二勝緣引導三初主城神顯教修心三初以其華散作是二正以言教三初明十度行作如二即初地法應扶三福智圓滿應住三結讚徵釋佛子二身眾神密加受法三初讚友令欣爾時二放光加被從其三善財獲益善財三法堂羅剎教求友之方三初教