body:
  text: 清凉山大華嚴寺沙門澄觀述七說分三初來意自下二釋名四初正釋本文二釋二通違論妨以上三通展轉妨又初四總指會釋又論三本文十初歡喜地七初來意三釋二釋名二釋三斷障三初總標三所二斷障謂二三斷愚三初以義生起上來二引論正釋由斯三結示斷義斷義四證理四所五成行五所六得果二初行布六所二圓融然上七釋文四初依經科三初正科第七二引證故依三會今論文而論二依論科二初正科今且二疏釋初云三對前相攝然十四釋經文二初長行四初四十句明住五初曲科佛子二疏釋初謂三引證瑜伽四會釋又此五釋文二初別顯住法四初十依何身二初總句今初二別句三初別釋二初科判別有二釋經已知二隨難料揀然小三六相圓融已知二十為何義二初別顯求相二初釋總為求二釋別此智二總結發菩提心四初疏略釋佛子二辨論釋而論三論指文能指四釋妨難又但三十以何因二初總科以大二釋論意云三釋文十句四十有何相二初釋總句佛子二釋別句三初依總開別二入二隨別解釋言一三結不相似論云二結住入位菩薩二三十句釋名二初總標佛子二別釋二初正明喜相二初總成就二別別中二出喜所因二初念當得故喜三初總別分別佛子二義類分別二初果若別二因二初總後八二別別中三三寶分別又上二念現得故喜二初正明所念二初釋總句復作二釋別句三初總敘文意別有二隨文別釋二初通明前八九中二別明第九三初正釋九捨二會通即前三釋文言怖三結指決定然此二隨難徵釋五初總問徵起何以二列名總答二答三轉徵所以何以四舉因顯相二初釋經文意四舉二開義別釋二初彰五畏之果三初揀死不活五怖二揀死惡道死約三通妨辨攝但說二彰五畏之因三初引論總釋此怖二分別解釋二初通然此二別三初雙標若取二釋初因四初牒論文釋邪智二別配三因愛著三彰其所離但無四會釋經文然不三釋後因二初明因後二二辨離今具三總以結示初三五結酬初徵三初釋經菩薩二敘論而論三釋論意謂三三十句安住三初總明安住佛子二別顯安住三初信心成就所謂二修行成就二初依論解釋日夜二隨要別釋其第三回向成就二初總求一二別二初一能求之觀別即二十能求之行二初一求諸度無著餘十二九別治諸障下九三總結安住佛子四校量勝分三初總名分齊大文二問答料揀二初問問經二答三初標心體然其二開章釋此三三總結酬今此三正釋經文二初文前科判文分二依科解釋三初願勝為標志遐廣二初彰大意五初名體二初名二初總二初釋願釋願二釋大二初約通三初正釋而言二引證瑜伽三結示今揀二約別別別二別後顯二體後體二修證二初約修行二修二約修證後約三行位二初約修行二初約別顯三行二約通論若約二約修位後約四因果四約五圓融二初立意五立二圓融言圓二正釋文二初十願彰自勤行四初總標佛子二別列二初總科十願四意分齊二別二料揀依經解釋十初供養願三初彰願行相所謂二彰願德能廣大三彰願分齊一切二受持願四初總標又發二行相願受三德能廣大四分齊一切三轉法輪願四初總標又發二行相四初處願一二時從兜三方便皆悉四周遍於一三德能廣大四分齊一切四修行二利願四初總標又發二行相二初能增長行願一二所增長心教化三德能廣大四分齊一切五成熟衆生願四初總標又發二行相二初願所化願一二彰所為如是三德能廣大四分齊一切六承事願四初總標又發二行相二初所知願一二能知智皆三德能廣大四分齊一切七淨土願四初總標又發二行相二初釋文願一二收束今依三德能廣大四分齊一切八不離願四初總標又發二行相三初所顯願與二別明二初修同行無有二德用同得不三總結三修三德能廣大四分齊一切九利益願四初總標又發二行相二初總明願乘二別顯二初作業不空若暫二利益不空得如三德能廣大四分齊一切十成正覺願四初總標起願又發二別顯行相二初成菩提體願於二菩提作業七初示正覺業不離二說實諦業得佛三證教化業以一四種種說法業以一五不斷佛種業示入六法輪復往業三初釋經示大二雙結前即三釋名三對七自在業二初依本論釋以法二依智論釋又依三彰顯德能廣大四明願分齊一切三總結佛子四攝眷屬以此二明十盡句與衆生共二修行勝依願造修三果利益勝即位行成就二偈頌二離垢地三發光地四焰慧地五難勝地六現前地七遠行地八不動地九善慧地十法雲地二明十盡句與衆生共二初總標佛子二別顯二初顯上十盡二初徵何等二顯三初總分別所謂二廣略分別世間三無量分別又上二顯大願成就若衆二修行勝依願造修三初明行所依之心佛子二顯所成行之相七初列名第二二辨體二辨三得處三明四約修四約五二利五約六次第六明七釋文十初信行二初正攝德成人成淨二正顯信相三初總信因果能信二別明因果二初二句明因信成二七句辨果信成三結略顯廣舉要二悲二初明三觀為方便三初遠離最上第一義樂觀二初總顯起念佛子二顯所離樂諸佛二具足諸苦觀二初前際三支二初總二初釋邪見二初正明而諸二引證涅槃二釋心墮二初問本在二答此有二別三初五無明二初三迷法義過三初總科釋無明二釋敝意初二三二迷義次二二二追求時過二初總釋本文四行二躡前生後由上二三是行二初總辨貪恚二別明三初略釋次二二論釋謂於三釋妨思通三一是識三初標名出體欲流二出經論意以其三正釋本文四初釋心意識心意二別釋起字誰能三用四流義善樂四懸解妨難二初問若爾二答理實二中後九支三初列三名於三二釋三名四初正明所以言自二引例解釋猶如三結成隱顯是則四順論證成此釋三釋文三初自相五初釋報義今初二引文證故論三出體相此含四引證三相三初引論列名故攝二釋彼論意此意三會釋二論今論五釋本文三初明報相二初明所生之處經云二辨出苦之相三初牒經總標所謂二引論解釋論云三疏家釋論三初總顯論意謂名二出色名體名謂三顯共生義此二二是因相二不三彼果相三彼二同相有生三顛倒相二初總明是中二別辨三初總列四重此有二別明次第二初明外道初約二辨小乘四初約五薀若約二約六根約六三通外難現有四重答難二初舉法相答又心二結酬其問此四三明其第四四如三彼二顛倒觀然諸二明所起之行相二初明興悲菩薩二明興慈復作三慈二初明三觀為方便三初遠離最上第一義樂觀二初總顯起念佛子二顯所離樂諸佛二具足諸苦觀二初前際三支二初總二初釋邪見二初正明而諸二引證涅槃二釋心墮二初問本在二答此有二別三初五無明二初三迷法義過三初總科釋無明二釋敝意初二三二迷義次二二二追求時過二初總釋本文四行二躡前生後由上二三是行二初總辨貪恚二別明三初略釋次二二論釋謂於三釋妨思通三一是識三初標名出體欲流二出經論意以其三正釋本文四初釋心意識心意二別釋起字誰能三用四流義善樂四懸解妨難二初問若爾二答理實二中後九支三初列三名於三二釋三名四初正明所以言自二引例解釋猶如三結成隱顯是則四順論證成此釋三釋文三初自相五初釋報義今初二引文證故論三出體相此含四引證三相三初引論列名故攝二釋彼論意此意三會釋二論今論五釋本文三初明報相二初明所生之處經云二辨出苦之相三初牒經總標所謂二引論解釋論云三疏家釋論三初總顯論意謂名二出色名體名謂三顯共生義此二二是因相二不三彼果相三彼二同相有生三顛倒相二初總明是中二別辨三初總列四重此有二別明次第二初明外道初約二辨小乘四初約五薀若約二約六根約六三通外難現有四重答難二初舉法相答又心二結酬其問此四三明其第四四如三彼二顛倒觀然諸二明所起之行相二初明興悲菩薩二明興慈復作四施三初總明施行佛子二別顯施物二初總凡是二別所謂三總結行成二初結其所為為求二正結行成是名五無疲厭三初牒前起後佛子二正顯行相轉更三結共成行即得六知經論得無七知世法獲是八慚愧成世九堅固力於此十供養佛得堅三總結十名體用二初釋文佛子二料揀二初問安然二答二初舉論論云二疏釋前句三果利益勝即位行成就五初標列第三二釋名四初釋調柔第二二釋發趣二發三釋攝報三五四釋願智四內三分齊四初總標分齊三明二當地分齊行修三有無分齊八初四法果分齊八初四通局四辨五釋文四初調柔果三初法四初見佛為練行緣二初總標佛子二別釋所謂二所練行體悉以三別地行相三初正明行相二初約四攝以前二約十度是菩二反質成立若不三總明義類是以四練行成熟是菩二喻二初正明佛子二解妨二初問金性二答信等三合菩薩二發趣果二初正明發趣四初法四初問二初徵問所以佛子二釋所得法三初依論釋相未知二出體所以相即三再顯法體又此二知三初舉經意是菩二以論釋論攝三以問攝知二初以經問攝論之五若以二以經問攝經之知若攝三行佛子四到由此二喻佛子三合佛子四結是故二總結地相佛子三攝報果二初明在家果二初上勝身佛子二上勝果二初行二初大悲利他能以二不失自利三初總釋本文如是二引論釋意謂利三正釋經文所念二願復作二明出家果二初捨俗出家是菩二修行尅證三初橫論既出二豎論能住三速疾能入四願智果若以二偈頌二初正頌前文二初頌說三初頌住四初頌依何身爾時二頌依何義淨一三頌以何因悲先四頌有何相佛子二頌釋名二初頌喜相多喜二頌喜因二初頌念當得此處二頌念現得始得三頌安住三初頌信心成就常行二頌修行成就思惟三頌回向成就修行二頌校量勝三初頌願校量恆起二頌行校量如是三頌果校量四初頌調柔果如是二頌發趣果譬如三頌攝報果住此四頌願智果若自二二頌結說我於二離垢地七初來意二初舉論第二二疏釋言正二釋名六初明引瑜伽言離二暗引攝論謂性三引唯識義唯識四會婆沙文文住五重引瑜伽瑜伽六結成約戒故此三斷障二初明斷障言邪二辨斷愚由斯四證如如最五成行是以六得果無等七釋文三初讚請二初慶聞初地二初二敘其三業慶喜諸菩二一發言正申其讚善哉二請說二地解脫二正說二初明地相二初發起淨三初結前標後爾時二徵列十名二初總釋何等二別釋二初科別中二釋一者三結行入位菩薩二自體淨四初總科第二二攝位此三三料揀二初通三聚律儀二料揀初二初正揀又初二解妨二初總難若爾二總答二初總敘昔解古釋二申今所釋今更四釋文三初攝律儀戒三初標所依佛子二正釋戒相十初不殺生二初總明性自二別顯三初明因離二別二對治離二初正釋二對二揀濫二初正揀此中二通妨二初舉妨若爾二釋妨前約三果行離二初略釋經文三果二具緣成殺三初依本論正釋粗中二引他論會通然雜三指廣在餘又境二不偷盜二初總性不二別三初因離別中二對治離二對三果行離三初分其粗細三果二具緣成犯而文三對顯差別殺淫三不邪淫二初釋總性不二釋別三初明因離三初正釋本文別中二會通二經晉譯三顯今經之意知足二對治離二對三果行離二初總舉邪境三於二以細況粗二初正以喻況二以二顯無具緣