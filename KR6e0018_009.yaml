body:
  text: 清涼山大華嚴寺沙門澄觀述大文第四依人證入成德分即逝多園林一會入法界一品二十一卷經文分四初來意二初明分來入法二會品來會品二釋名三初分名二釋二會名二會三品名三初總明二品二得名二初法法界二界二初五約理法界界有二三雙約事理復有三釋名於中三宗趣三初約義二初所入二初牒章料揀三明二依義別釋五初有為法界總唯二無為法界二無三俱句法界三亦四非句法界四非五無障礙法界五無二能入二初別列五門二明二對前料揀二此二約類五初所入五初法法界第二二人法界二人三俱融三人四俱泯四人五無礙五無二能入二明三無二三能四雙泯四能五無礙五一三約位三初所入第三二能入二明三雙結三因四釋文二初本會十初序分三初智正覺世間圓滿爾時二器世間圓滿三初國城在室二園林逝多三重閣大莊三衆生世間圓滿三初菩薩三初舉共數與菩二列名三初標二上首普賢二別列衆名二初通表住等四位四初幢表回向其名二威力表行地威三藏表地地藏四眼表解善眼二別表十地十度十初冠表初地天冠二髻表二地梵王三光表三地大光四幢表四地福德五音表五地梵音六上表六地法上七勝表七地光勝八自在表八地娑羅九音表九地寂靜十覺表十地須彌三總結數如是三歎德二初總此諸二別境界二聲聞二初標數及與二歎德二初約就跡悉覺二約本門悉曾三世主二初標數及與二歎德二初約就跡悉覺二約本門悉曾二請分三三昧分四遠離新衆分五舉失顯得分六偈頌讚德分七普賢開發分八毫光照益分九文殊述德分十大用無涯分二請分二初標衆念請時諸二顯所請法二初念德難思三初所念果法如來二玄妙難思一切三緣會可了唯除二請隨機演二初請隨機宜唯願二請所說法二初所請二初請往因顯示二請果用及成二結請如是三三昧分二初能現三昧二初敘意四初入定之由大文二辨其次第即以三能入之人佛自四通釋妨難不言二釋文三初入定緣爾時二入定因大悲三正入定三初總標入師二釋名二初敘昔解言類二辨順違三初明唐梵非類然舊二引二文證成涅槃三結彈昔解但敵三釋義二初略故依二廣二初總明所據二初引涅槃若別二引當經又離二開章別釋二初以十義今會二依涅槃二初合十一事次言二合隨逐又野二所現淨土三初結前標後入此二嚴此園林二初正顯嚴三初嚴重閣二初廣處于時二顯嚴金剛二嚴園林爾時三嚴虛空時逝二出所因二初徵何以二釋如來三結通法界二初結前標後如於二正顯嚴相所謂四遠集新衆分三初別集十方爾時二通讚行德二初總如是二別三初上近諸佛德以淨二下攝衆生德三初微細化生於一二明攝生智知一三攝生語業勇猛三大用自在德三初三業摧邪一切二意業自在恆以三身業自在以自三總結集因如是五舉失顯得分三初明不見之人于時二明所不見境三初不見果皆悉二不見因亦復三結不見如是三釋不見所由二初徵何以二釋三初法說二初闕宿因四初總標善差以善二舉劣異勝二初不見佛果之因二初總本不二別二初不讚果本不二不修因二初闕自分本不二闕勝進本在二不見菩薩之因本不三舉勝揀劣如是四結不見聞以是二闕現緣三初無勝德二初無勝德行復次二顯不能見是故二住自解脫二初徵何以二釋二初住自乘諸大二結所無於彼三結成不見是故二喻顯三初總料揀二初敘昔總許第二二申今正義二初總明今解二別顯二者二隨文別釋十初鬼對恆河喻二初喻二初總顯喻意佛子二別釋經文言餓二合彼大二覺夢相對喻二初喻譬如二合二初合夢者自見一切二合大會不見一切三愚對雪山喻譬如四伏藏難知喻譬如五盲不見寶喻譬如六淨眼無障喻譬如七遍處定境喻二初喻三初釋名譬如二會釋五初雙標經論然喻二依俱舍釋先觀三辨所依定前八四明其建立瑜伽五釋於後二無色三會通經意二初以經會論今以二以論例經例此二合如來八妙藥翳形喻譬如九二天隨人喻如人十滅定不行喻譬如三逆配闕因又上三徵結二初正釋何以二通妨三初結前文以為難本上來二正申難意問般三會釋本文五初不共般若答為二化儀不同四初釋通上問又大二揀外謗顯化儀或以三重通前難或令四會釋二經然法三通局有殊又復四開顯有異三初直就法說又若二重以喻況其猶三法喻雙明是以五結成緣起既非六偈頌讚德分十初東方二初總爾時二別二初歎佛三初內德深廣善逝二內外無礙以了三結成今用今於二歎菩薩汝觀二南方五初令觀內德爾時二示其集處今此三寂用無礙無來四結歸佛力汝觀五結其德廣一切三西方二初法說爾時二喻顯如日四北方二初喻內德爾時二喻大用譬如五東北方四初見無不益爾時二明益菩薩一一三明益用遍難思四結益周普如來六東南方三初凡小難思爾時二出難思法正覺三顯能知人若有七西南方四初總顯難思爾時二舉因顯果從不三示難思相三初智照淨障光明二示顯深廣示現三念智圓融菩提四結勸思修智者八西北方二初總標觀成爾時二展轉成益二初七各明一行若得二總結深廣菩薩九下方二初標名難聞爾時二別顯益物四初生福益如來二向菩提益如來三成智益如來四就人結益如來十上方四初總舉佛德爾時二恩深難報如來三發荷恩心寧於四釋荷恩意何故七普賢開發分二初長行三初明開發意爾時二明開方便以等三正明開顯三初總標為諸二徵釋何等三總結佛子二偈頌二初說偈儀意爾時二正說偈辭一一八毫光照益分四初毫光普示四初光意爾時二光體用從眉三光攝眷屬以不四光照分齊普照二依光見法二初此衆普見二初能見人時逝二所見法二初見此會遍法界之塵剎悉見二多類攝化遍周法界三初廣大會遍或見二遍處不同或見三別彰所現現種二類餘十方二初舉此顯彼如此二以彼類此二初能見分齊如是二所見自在皆亦三見證因緣其有四明其得益二初因見得法二初略顯三初明所入是故二明能入彼諸三結所入入如二廣明二初廣能入三初徵起云何二別列所謂三總結菩薩二廣所入二初列十初智位高深德其諸二調生無染德為諸三成滿諸度德智慧四智力無畏德以不五成就昔行德善巧六法身圓滿德普見七色身自在德已得八辨才自在德決了九三昧神變德得佛十成等正覺德一一二結其諸二荷恩供佛三初總爾時二別所謂三結是諸九文殊述德分二初述意爾時二正頌六初總歎廣遍汝應二衆生世間從諸三依正互在寶樹四述上林空逝多五述智正覺十方六總顯普收十方十大用無涯分二初總顯用因爾時二依體起用二初別明毛孔世主化二初總顯於其二別顯四初能化法二初諸雜門化或現二十度門化四初六度化或現二方便度或現三力度或現四智度或現二所化處二初結前生後以如二別明所在所謂三能化心以平四所化益或有二通顯其分身多類化二初住處化異佛子二現身化異五初化身異佛子二化處異往詣三化類異隨其四化法異或說五末不離本教化二明末會分五相二初略以十門料揀二初總列十門大文二依門別釋十初總顯會意二初標今初二釋二初出三對之由故非二明該羅等義故前二會數開合二初明局二會二明通三初標會數若約二釋成上義雖人三結通義是以三會主多少三會四定會名義二初假申問難四定二引文解妨若爾五二位統收二初總立章門五二二依門解釋二初相對明表三初能所相對今初二解行相對二以三理智相對三以二互融顯圓二初正辨二初二相別明二初融文殊能信及解之智二互二融普賢所信及行所證依體二二聖相融二以二總釋是以六五相分別四初雙標六分二雙會二皆三正釋五初寄位修行相且依二會緣入實相二從三攝德成因相三慈四智照無二相四後五顯因廣大相五普四料揀三初釋後四相其後二依前五種今從三別配五相此五七圓攝始終七圓八會主類別二初總明類別八法二別顯義相四初約果攝二顯二約因攝二約三約義攝三約四約相辨四約九法界事義九法十隨文解釋十隨二廣依五相以釋經文五初寄位修行相五初文殊一人寄十信位二初能化發起三初標主出閣爾時二別明伴從與無三總顯出儀文殊二成彼化事三初比丘會二初助化攝機二初覩緣興念爾時二攝衆同遊二初總辨攝儀時尊二別明所化三初列數標位此六二列名所謂三歎德悉曾二正明化益二初身儀攝益四初示勝境三初標告爾時二正教海覺三結略顯廣爾時二得勝益彼諸三詣勝人即白四蒙勝攝二初示其攝相爾時二設敬興願時諸二語業攝益二初受自分法二初受法三初舉益標告爾時二別示行法何者三舉益勸修比丘二得益二初別明一定二初定體時諸二定用四初天眼用得此二天耳用及亦三他心用亦能四宿住用亦能二通顯多門又即二受勝進法二初教勸爾時二展轉成益以成二諸乘會四初結前所作爾時二明到化處漸次三顯所說法時文四明所益衆二初諸龍會說此二三乘會復有三善財會二初總列十門自此二依門釋義十初趣求有異今初二修入衆殊二修三示方不同四初總辨類勝三小二別釋南方然南三對釋料揀此五四敘其順違有人四見處差別四見五遣不遣別五遣六歎不歎別六歎七推不推別七推八結不結別八結九去不去別九去十隨文釋四初四部雲奔二初總明時福二別顯四初優婆塞時有二優婆夷復有三童男復有四童女復有二三業調化二初身意調機二初總調大衆爾時二別觀善財二初總標復於二別顯二初觀外緣二初別明知此二總結以此二觀內因又知二當機受法三初結前標後爾時二別舉法門所謂三結說勸進爾時三上根隨逐二初總敘說因三初出說因爾時二申正問此菩三釋本文四初敘上古古有二敘下古有云三破下古然此四敘中古四初正敘昔義賢首二敘昔成立若爾三疏辨順逆此之四引經文證二初正證地獄二彈昔三初正彈有以二審定又定三結違無得二正揀偈頌二初傷己沉溺二初依果起因三有二依因趣果貪愛二請垂拔濟三初讚人求法二初希垂拔濟妙智二冀成果行四初總求於道三有二求涅槃道捨離三求菩提道善知四求見道緣去來二讚法求乘四初利他乘願輪二自行乘常轉三滅障乘普行四廣大乘智慧三雙結人法四攝四大聖重教四初略讚略教二初讚爾時二教善男二廣問廣答二初問二初對前料揀第二二隨文別釋二初釋總句善財二釋別句三初橫釋應云二竪釋若竪三雙結橫竪二答二初別讚別教五初正讚爾時二略教若有三重讚福光四廣教汝見五結益此無二總讚總教二初讚爾時二教二初案定善男二誡勸善男三指示後友二初舉友依正善男二勸往教問汝可四念恩辭退二初正明爾時二問答二初問問大二答明此二德雲比丘下十人寄十住位三善見比丘下十人寄十行位四鬻香長者下十人寄十回向位五婆珊夜神下十人寄十地位二會緣入實相三攝德成因相四智照無二相五顯因廣大相第二德雲比丘已下有十善友寄十住位十初德雲比丘寄初發心住六初依教趣求向勝二見敬咨問四初設敬儀則見已二申已發心作如三正陳所問而未四歎德請說我聞三稱讚授法二初讚器希有二初標二難時德二牒前問所謂二正示法界二初示體相二初標名善男二釋相信