萬二嚴處攝生時安三許示宿善時安四設敬陳請爾時五正示昔因時安三示己法界四初標體名用善男二別顯業用善男三得法時處善男四總結純熟善男四謙己推勝善男五指示後友善男六戀德禮辭時善第五婆珊婆演底主夜神下一十人寄十地位十初婆珊婆演底主夜神寄初歡喜地六初依教趣求二初依前修證爾時二趣求後友漸次二見敬咨問二初見友依正作是二設敬咨問善財三稱讚授法二初稱讚時彼二授法三初標名體善男二明業用二初長行二初興救物心善男二對緣救攝二初總明善男二明顯九初救海難衆生為海二救處陸衆生為在三救求不得衆生一切四救樂國土衆生善男五救求著聚落衆生善男六救暗夜衆生善男七救惑業衆生是諸八救八苦衆生善男九救惡見衆生善男二偈頌四初法門名體爾時二舉因勸修我昔三顯果令入我自四業用廣大我以三明久近二初興二問爾時二還兩答二初答發心時節六初本事因緣其神二約初佛興時彼三善友勸發蓮華四正發大心令王五結會古今善男六發心成益我於二答得法久近二初總顯因緣過此三正明得法三初得方便三昧我才二得此解脫以問三廣顯業用得此四謙己推勝善男五指示後友善男六戀德禮辭二初讚德四初身心超勝爾時二大用無涯一一三益物不虛若有四結德無盡千剎二禮辭時善二普德淨光主夜神寄第二離垢地三喜目觀察主夜神寄第三發光地四普救衆生主底神寄第四焰慧地五寂靜音海主夜神寄第五難勝地六守護一切城主夜神寄第六現前地七開敷樹華主夜神寄第七遠行地八大願精進力主夜神寄第八不動地九嵐毗尼林神寄第九善慧地十釋女瞿波寄第十法雲地二普德淨光主夜神寄第二離垢地四初依教趣求爾時二見敬咨問頂禮三稱讚授法二初讚夜神二授二初長行三初正授法門二初總答所問善男二別示己法二初名體善男二業用四初攀緣如實禪普見二現法樂住禪二初牒前起後善男二正顯四禪四初初禪思惟二二禪息一三三禪思惟四四禪悉能三引生功德禪增長四饒益有情禪三初令修四念處觀善男二明作道因緣觀若有三令修四正斷復次二謙己推勝善男三指示後友二偈頌三初正授法門爾時二推勝知多諸佛三指示後友此近四戀德禮辭時善三喜目觀察主夜神寄第三發光地六初依教趣求二初正依前友念教成益爾時二趣求後友得友加持四初欲趣後友作是二得友加持時喜三加所成益時善四正明趣後爾時二見敬咨問見彼三示己法界三初標名體入大二顯業用三初顯無涯用二初出演說修行身三初總標釋名於其二別釋十度十初施所謂二戒出等三忍又出四進又出五定又出六慧又出七方便又出八願又出九力又出十智又出三類通餘法如說二出演說本行身四初出說法之身復於二明演法之聲於彼三顯說之法二初本行十度以如二類通所餘又說四彰說之益如是二覩用獲益三初顯證因緣爾時三正明證入則得三徵釋所由何以三慶益稱讚十偈四初現說之因爾時二現說之意了知三現說體相法身四現說無礙了知三出所因二初興二問爾時二具二答二初以偈答二初答發心久近十初寂靜音劫六初總標舉爾時二明本生百萬三明本事日光四正發心見已五發後德我時六值餘師從此二天勝劫從此三梵光明劫從此四功德月劫次從五寂靜慧劫此後六善出現劫次第七集堅固劫次第八妙勝主劫次第九千功德劫次第十無著劫次第二答得法時節二初得無功用三地次有二結成普賢行德三初大心之始見衆二成德之終從是三總結圓滿佛子二會古今善男四謙己推勝善男五指示後友善男六戀德禮辭時善四普救衆生主夜神寄第四焰慧地五初依教趣求二初修入前法爾時二趣求後友一心二見敬咨問四初見光加持時彼二蒙光獲益二初後定善財二見用二初見用所依處得此二明所見之事三初所化處二初總明類處一一二別明廣剎又見二能化益二初總明如是二別顯二初化五道令地二化九類又見三明化益為成三三業敬讚三初身心敬重時善二顯友自在時彼三口以偈讚二初總爾時二別二初廣明無涯我見二述蒙獲益三初推功歸本我承二述得三昧見尊三述見大用我於四問答因緣二初問爾時二答二初歎深難說夜神二承力為說二初長行二初標許我承二正說二初通答三問三初得法久近十初劫剎佛興善男二通顯剎相其佛三別顯生處此界四明水父母有轉五明本生身其有六彰佛現因爾時七佛興益物三初得道之場時彼二總顯佛教須彌三別明初佛七初總明成道其第二成道前相其彼三動剎集衆滿七四現相顯德爾時五成道依正善男六始成正覺善男七轉正法輪三初總轉法輪隨衆二顯其成益於一三結無間斷善男八善友引道六初知機起惡時普二現身超勝化現三物機驚怪時諸四告佛出興爾時五女發大心時聖六父王詣佛四初身處虛空善男二以偈讚引三初總勸以偈二釋勸無量三結勸今當三廣興雲供爾時四至彼修敬到已九德女修因三初嚴具供佛時轉二見佛現變時莊三覩變獲益既見十聞經得益三初佛為說經普智二正明聞益三初得三昧益時彼二得大心益得如三成大願益一心三顯發昔因時彼二發心之始善男三結會古今三初得法時身善男二發心之始我於三正結得法次復二別答修治二初舉大光劫三初總明善男二別顯其最三最後善男二總顯諸劫三初總標事佛善男二得法修行彼諸三見佛行成善男二偈頌三初舉法誡聽爾時二頌前正說二初頌最初一劫我念二頌總顯諸劫須彌三舉因勸修我於三謙己推勝善男四指示後友善男五戀德禮辭時善
