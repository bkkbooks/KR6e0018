body:
  text: 清涼山大華嚴寺沙門澄觀排定梵行品四初來意三初標梵行二釋六別三結具上二釋名四初正釋本名二釋二顯出體性三初略列三類梵行二對辨異同涅槃三別釋其相然此三結成本名梵即四對前揀異然前三宗趣三宗四釋文二初問二初敘問答人爾時二正顯問端佛子二答二初答行淨所因二初明自行清淨即離相之戒成四初總示所應法慧二列名異釋所謂三廣陳修相十初觀身若身二身業若身三觀語若語四語業若語五觀意若意六意業若意七觀佛二初釋文若佛二明觀四初正破今一二引證故中三遮難尚非四結成是知八觀法三初通辨意若法二正釋文然法三明觀相今推九觀僧二初八約人三初釋果何名義若僧二陳指廣所由今此三出觀行意趣此中二二明德後二十觀戒三初總明若戒二別徵其中三料揀四初總引二文若依二體會所以此上三二相不同又善四結成本義故所四顯觀成相三初約所觀十境如實觀成如是二約所成梵行如實觀成此中三結成梵行清淨之相如是二明利他行淨即無緣之四等二初觀深智即利他之方三初舉法應修復應二徵起別列何者三結勸廣學於如二慈念衆生成無緣之四等聞已二答因所成果二初牒前因深若諸二正酬果滿二初標一切二釋二初釋疾現之言初發二釋現前之相知一初發心功德品中文分為四初來意初發二釋名二釋三宗趣二初正釋宗趣三宗二揀其異釋三初正揀然住二遮破三初通其正立生如二引文反質若謂三通知三世若謂三結成六初歎深謙推夫機二進退立理且以三結成損益諸佛四舉例證成旦夕五況出功高況十六引文成立故經四釋文七初天王請説分爾時二歎深難説分二初總法慧二別難説三約喻校量分二初結前生後雖然二正顯校量十一初利樂衆生喻二初一廣説四初舉廣佛子二徵問佛子三答廣天帝四超過法慧二九略説四初併舉九事佛子二徵問佛子三顯廣天帝四校量三初辨超過法慧二徵問何以三釋意二初別翻前喻佛子二總顯具德為令二速疾步剎喻四初舉廣喻佛子二辨超過菩薩三徵何以四釋二初反釋彰前不及佛子二順釋辨此過前為子三知劫成壞喻四初明喻廣大佛子二對辨超過佛子三徵何以四釋二初反釋菩薩二順釋三初總為悉二別所謂三結是名四善知勝解喻四初舉廣喻佛子二辨超過佛子三微何以四釋二初反辨佛子二順釋二初總為盡二別二初有八句總相以辨所謂二有五句二別明五初三對約佛菩薩相望欲悉二六對約五乘凡聖相望欲悉三有四解約佛乘説欲於四有三對唯約衆生欲以五三對多約教結二初正明欲悉二總結一切五善知諸根喻四初辨廣喻佛子二辨超過佛子此十三徵何以四釋菩薩六善知欲樂喻四初辨廣喻佛子二辨超過菩薩三徵何以四釋菩薩七善知方便喻四初辨廣喻佛子二辨超過菩薩三徵何以四釋菩薩八善知他心喻四初辨廣喻佛子二辨超過菩薩三徵何以四釋菩薩九善知業相喻四初辨廣喻佛子二辨超過菩薩三徵何以四釋菩薩十善知煩惱喻初辨廣喻佛子二辨超過佛子三徵何以四釋二初反顯佛子二順釋二初總為盡二別六初門總明所謂二流轉門欲盡三病行門欲盡四諸識門欲悉五相生門欲悉六出家門欲悉十一供佛及生喻三初舉喻校量二初廣明一人四初舉廣喻二初廣説東方二初明佛在供養二初自行佛子二化他又勸二明滅後供養至佛二略例九方南西二問佛子三答天帝四校量顯勝佛子二略辨九人二初舉廣喻佛子二校量顯勝佛子二徵何以三釋二初反顯佛子二順釋為供四就法略釋分五動地興供分六他方證成分七以偈重頌分四就法略釋分二初牒前諸喻所校量心發是二明此大心所攝功德五初解行圓滿三初總舉所知能知二攝以修證彼諸三徵釋所以何以二妙果當成二初標因所得以發二徵釋所由何以三與佛平等應知四能作佛事二初約法圓融才發二約所見性四初正明二約二設難若爾三解釋請以四結成依於五大智現前二初正明無著此初二釋其所由二初所標反釋後唯二述正義今釋五動地興供分爾時六他方證成分三初佛現證成是時二顯益證成二初現在益二初釋經起問汝説二答其所以四初標他宗然餘二示正説此宗三釋二宗起信四申結勸並有三結通無盡二初明説法遍如此二示所同説其説二未來益我等七以偈重頌分二初辨偈來意爾時二正顯偈辭三初八十二偈頌就法略示五初解行圓滿二初一偈正明為利二十六偈頌徵釋七初充遍世界究竟二普度衆生慈念三知世界成壞有剎四知衆生垢淨菩薩五知不斷佛種紹隆六知衆生心樂諸趣七知衆生三世智其心二能作佛事十初説法調生菩薩二諸佛讚歎十方三振動世界過去四息滅諸苦菩薩五光照世界放大六嚴淨國土於一七令物歡喜十方八能入法界智慧九持佛種性三世十示現成佛普為三得佛平等四初佛境平等菩薩二功德平等善知三德佛平等一身四真實智慧四初發離妄想廣大心於諸二發窮三際廣大心一時三發順二果廣大心隨順四舉妙道智以結勸欲得四大智現前二初結前生後趣向二正頌大智無量五妙果當成九初諸佛護念恆勸二當得菩提菩薩三與大妙法為欲四佛體平等善知五修助道法普請六佛力無畏衆生七莊嚴佛法菩薩八説法智慧菩薩九結德無盡菩薩二三十四偈頌喻量二初正頌前喻十方二通釋所由三初結前生後所説二正釋所由三初標章以諸二別釋二初體無齊限一切二出生無盡三初結前生後此是二正釋出生菩提三略釋所以以因三顯德圓滿智慧三結德無盡十方三五偈頌結勸發心三初正勸欲知二釋勸此心三結勸欲見明法品第十八四初來意明法二釋名二釋三宗趣三宗四釋文三初請説分二初長行二初敘問答之人爾時二正申所問二初領前自分勝德二初總佛子二別具大二請説勝進行二初問所成行體二初正問彼諸二結請佛子二問行成德用二初正問二初問行所成因德復次二問結因成果德二初正結平等及餘二顯等佛用於諸二祇夜二初一讚説者爾時二十頌上文二初一頌領前若有二九頌請後二初四頌所修行體彼復二五頌行所成德二初三頌行所成因德水破二二頌結因成果德云何二正説分二初長行二初讚問許説三初讚所問利益爾時二讚能問具德佛子三誡聽許説諦聽二正答所問二初答所成行體十初答第一段中文分為二初二十句答前修習分為二初牒前標後佛子二別辨本文二初十始終四初總標佛子二徵數何者三別列一者四總結佛子二十終成佛子二三十句答令佛歡喜分三初十結前生後佛子二十成正行相佛子三十純熟究竟佛子二答入菩薩所住處問三初起入地行佛子二住地觀修復次三明地要勝佛子三答大行清淨問二初明因佛子二明果菩薩四答大願問二初十起勝清淨佛子二十勵志圓滿佛子五答獲菩薩藏問佛子六答隨所應化常為説法問三初結前生後菩薩二徵以標起佛子三正解其義二初知器授法二初知器所謂二授法貪欲二具德成益為説七答恆不捨離諸波羅蜜問二初結前生後菩薩二正示不捨十初檀是時二戒具持三忍悉能四進普發五禪定二初按文解釋十一初訶彼五欲二初彰訶意於五二明訶相三初正示其過云何二結以正訶此五三辨無訶相況菩二入次第定二入三安住理定三安四消滅煩惱四消五出生諸定五出六引發神通六引七逆順自在七逆八一多自在八一九悉知定境九悉十總結體用十者十一速入智地十一二別明料揀又上六般若二初隨文釋於諸二總料揀二初對九門此中二明揀濫六初對前定門其中二引證別辨若全三以六對七後之四反成前義豈令五總結萬行非唯六況結深玄況般七方便二初隨文釋示現二收束二初以二種方便收初九二通明後之四相依瓔八願二初隨釋盡成二收束此求九力二初隨釋具深二收束一契十智二初隨釋知貪二收束前七八答所念衆生咸令得度問三初結前生後佛子二正明化度墮惡三結如本誓如其九答紹三寶種使不斷絶問二初仍前總標佛子二徵釋所以所以十答善根方便皆悉不空問二初略三初結前生後菩薩二不空無瑕隨有三不空所作無暇二廣二初明自業不空四初標菩薩二徵何者三釋所謂四結菩薩二辨利他不空若有二答行成德用二偈頌三結説分時法二答行成德用二初答以行成因德佛子二答以因成果德二初結因成果佛子二正答所成九初答其總句於無二答衆魔外道一切三答攝持衆法守護四答十王敬護於無五答舉世同欽知諸六答菩薩敬愛其身七答善根增長善知八答開演法藏菩薩九答攝持正法三初明自嚴佛子二徵何以三釋佛子二偈頌中文分二初六頌頌前所成行體六初二偈頌佛喜爾時二一偈頌入地佛歡三一頌菩薩藏如是四一頌不捨自行菩薩五半頌不斷三寶晝夜六半頌善根方便所行二四頌頌行所成德二初一頌以行成因德菩薩三頌以因成果德二初二頌通頌前之八段如是二一頌別頌第九攝持正法進止升夜摩天宮品四初來意二初會來升夜三品來次品二釋名二初會名二釋二品名次品三宗趣三宗四釋文十初本會圓遍爾時二不離而升爾時三天王見佛時夜四各嚴殿座二初一句總明即以二別顯嚴相四初座體備德百萬二座傍圍繞嚴百萬三法門行德嚴從百四法教流通嚴恆出五請佛居殿時彼六如來受請時佛七各念昔因爾時八偈讚十佛二初辨此界名稱二明結通如此九佛同升殿爾時十處忽廣容此殿夜摩天宮偈讚品四初來意夜摩二釋名釋名三宗趣三宗四釋文三初集衆十初正明集因爾時二辨主菩薩十方三明眷屬數一一四來處分量從十五列菩薩名其名六來處剎名此諸七所事佛名此諸八至已設敬是諸九參而不雜隨所十結通無盡如此二放光爾時三偈讚十初功德林二初説偈儀爾時二陳偈讚二初八述讚奇特深四初一偈敘此品放光佛放二二偈敘前品感應佛座三三偈敘此品衆集彼諸四二偈明自在普周十方二四舉德釋成二初一明舉因顯用昔發二二辨果用深廣遊行二慧林二初説偈儀爾時二陳偈讚三初一明佛難遇世間二六別釋難遇三初二益廣難遇佛放二一因圓難遇已修三三果深難遇如來三三偈校量顯勝無量三勝林二初説偈儀爾時二正陳偈讚二初三明佛德廣博六初總顯文意譬如二會彼梵經梵本三出熱月相西域四會經通難赫日五委彰時分彼方六結破刊定不見二七顯法體甚深四初出總標意後七二出於一性隨三所以三初明三性即一性以餘二明三無性即三性即依三融通為一實三性三結成上義故於四正釋經文三初三作生無自性性觀諸法二二兼修勝義無自性性觀諸法三二修相無自性性觀所説四無畏林二初説偈儀爾時二正説偈二初一所信之境如來二九聞信之益五初一頌聞信離惡若聞二二頌辨其難聞設往三三頌聞信成佛若有四一頌明聞必有由無量五二頌顯起行益若有五慚愧林二初説偈儀爾時二正説偈三初三法説難思三初聞生勝益若人二佛窮種智一切三顯智從生三初按經釋二初成前無有二成後二初正釋二者二會通二初約淨名難若爾二約無行難若爾二會實義然實三會晉經若準二六法喻並決二初明二性相違如色二辨功能不等如阿三一結德歸佛如來六精進林二初説偈儀爾時二正説偈二初一約法雙標諸法二九就喻雙釋二