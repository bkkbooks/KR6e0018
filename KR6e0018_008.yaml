法忍菩薩四成佛度生菩薩五知佛德無邊菩薩六欲知佛不退菩薩七決親人法菩薩八決入大乘菩薩九決平等度菩薩十因圓果滿菩薩四結佛子五勸菩薩五照徹智佛子六無等智五初標佛子二徵何等三釋所謂四結佛子五勸若諸七無下劣智五初標佛子二徵何等三釋五初降魔制外對佛子二喜他自滿對又作三積福成智對又作四下化上成對又作五悲智究竟對二初即智之悲又作二即悲之智四初列所知又作二辨能知如是三拂知相然於四會中道三初辨其中道非有二境智對明以不三即體起用以究四結佛子五勸若諸八高出智五初標佛子二徵何等三釋十初勤修能證智佛子二常觀所證理恒觀三內修無漏願於四外近善人為求五大忍度生若有六超魔境界菩薩七勤勇修行菩薩八不捨惡人菩薩九孤標等佛菩薩十權實雙行四初正辨菩薩二徵釋二初徵何以二釋菩薩三結成是故四離過不作四結佛子五勸若諸九深廣智四初標佛子二徵何等三釋二初四明無量界所謂二六佛界無量六初入三世佛善根菩薩二入過去佛界菩薩三入未來佛界菩薩四入現在佛界菩薩五供多佛菩薩六求多法菩薩四勸佛子四有三十九門答前十迴向十初救護眾生離眾生相迴向四初所迴善根如寶住四初標佛子二徵何等三釋十初供事多佛佛子二聞法受持於不三自在受生於此四說本末法知從五知斷自在知厭六悲智雙行知一七性相無礙知一八無得之得菩薩九觀空滿願菩薩十受行無厭菩薩四結勸佛子二大願救護如金剛大乘心四初標佛子二徵何等三釋十初知法佛子二度生菩薩三嚴剎菩薩四迴向菩薩五供佛菩薩六無著佛子七安忍佛子八徧行佛子九要心佛子十即寂起業三初悟寂佛子二起用而亦三釋成三初一番何以二次番何以三後番二初徵何以二釋二初諸佛皆爾故一切二不違先願故又我四結勸佛子三迴向所為大發起五初標佛子二徵何等三釋二初六自分二初三福業大佛子二三化業大又作二四勝進二初二勝進攝福又作二二勝進起化二初證體菩薩二十起用菩薩四結佛子五勸若諸四所化成滿究竟大事佛子二不壞迴向二初明不壞信佛子二迴向行成佛子三等一切佛迴向二初等佛善根佛子二迴向行成佛子四至一切處迴向佛子五無盡功德藏迴向佛子六隨順堅固一切善根迴向佛子七平等隨順一切眾生迴向佛子八真如相迴向無碍用四初總標十章三初標佛子二徵何等三列所謂二總徵十章佛子三依章別釋十初眾生無碍用佛子二國土無礙用佛子三法無礙用佛子四身無碍用佛子五願無碍用佛子六境界無碍用佛子七智無碍用佛子八神通無碍用佛子九神力無碍用佛子十力無碍用佛子四總結成佛佛子九無縛無著解脫迴向三初任志遊戲佛子二境界難量佛子三智用幹能佛子十入法界無量迴向三初迴向善根無畏四初標佛子二徵何等三釋十初聞持無畏佛子二辨才無畏佛子三二空無畏佛子四威儀無畏佛子五三業無畏佛子六外護無畏佛子七正念無畏佛子八方便無畏佛子九一切智無畏佛子十具行無畏佛子四結勸佛子二法界行體四初標佛子二徵何等三釋十初自利行佛子二化他行佛子三上求行佛子四善巧行五初巧離二乘佛子二巧修三昧善能三巧順世間往來四巧住諸乘雖現五巧窮因果雖念五雙行行佛子六隨智行佛子七代苦行佛子八攝物行佛子九堅淨行佛子十常修行佛子四結勸佛子三所成之德二初明業用佛子二明其體佛子五有五十門答十地門十初歡喜地行二初初住地中行四初依何身二初約身辨身二初約身業思佛子二約法自體佛子二就語辨身四初明語體用佛子二顯語淨因佛子三辨淨語果若菩四能成所作佛子二以何因佛子三為何義發心佛子四有何相周徧心佛子二安住地行佛子二離垢地行二初發起淨二初自分深心佛子二勝進增上心佛子二自體淨二初攝善律儀佛子二饒益有情三初解諸善佛子二解世間佛子三解眾生佛子三發光地行二初能起厭行二初熏習成氣佛子二增盛攝取佛子二所起厭行三初正顯修行佛子二修成勝緣佛子三修行離過佛子四燄慧地行三初清淨對治修行增長因四初明四地所以佛子二釋其總名謂離三會通彼經地經四揀大異小結云二清淨決定法佛子三對治修行增長二初修行增長二初正明增長出生佛法道佛子二顯立勝名大丈夫名號佛子二修行對治佛子五難勝地行二初勝慢對治行二初總標四門佛子二別明初門佛子二後二分中無量助道法四初勝慢對治佛子二不住道義以智三通難釋成今以四重明問答然正六現前地行四初顯修道佛子二顯同相無去三別科配屬十中四隨文別釋四中七遠行地行三初明權實雙行四初標佛子二徵何者三列三初五自行無染佛子二隨有攝化四初無染而化已到二處正入邪安住三持犯權實常善四人法權實不由三因果權實三初因圓示缺善根二得果不捨因與三三徵釋所以何以四勸若諸二明念念進趣佛子三明取授自在佛子八不動地行三初腹佛子二藏佛子三心佛子九善慧地行二初入地心佛子二住地心佛子十法雲地行三初緫標德首佛子二六根勝德六初眼五初釋眼義佛子二隨文釋二初釋前五眼五初釋肉眼十中二釋天眼然天三釋慧眼此中四釋法眼彼中五釋佛眼彼佛二釋後五眼後五三出體性故知四明次第若辨五示其源餘如二耳佛子三鼻佛子四舌佛子五身佛子六意佛子三四儀成規六初行佛子二住佛子三坐佛子四臥佛子五所住處佛子六所行處佛子六有五十一門六因圓果滿二初辨等覺之位三初因行體性二初起行方便三初意業觀察二初觀察佛子二普觀察佛子二身業自在佛子三語業宣唱佛子二十度行體二初六度六佛子二四等四佛子二方便造修二初自分三初明法義二初義佛子二法佛子二說福智二初福德助道具佛子二智慧助道具十初外近善緣佛子二內調法器永離三念慧安處念慧四法樂怡神樂法五真實修行六波六自他雙淨常樂七徧觀法性觀察八深解二空菩薩九止觀雙遊二初總修止觀菩薩二雙釋二門二初釋止心意二釋觀觀一十修習種智菩薩三顯圓足佛子二勝進三初更求法要佛子二得已明了三初明來意佛子二能了智總以三隨文釋一是三如說修行佛子三因行除障二初離障成行三初離障體二初顯魔體三初總釋佛子二辨異然四三辨攝若欲二辨魔因二初釋業相佛子二隨文釋十中二離障方便佛子三見佛成行二初見佛六初會同前文佛子二別釋見義然此三隨文正釋一無四總結圓融依上五攝之成對又此六總結包含又此二成佛業四初標佛子二徵何等三釋五初覺導夢化對所謂二開纏淨戒對為他三現相說法對若有四降魔護小對若有五悲攝雙行對生死四結是為二離障加持二初內成離障行二初離障慢業三初依俱舍列名釋七慢三初依俱舍列名佛子二對文開合今文三正釋本文前三二依涅槃成實釋八慢若約三結略指同餘如二顯治智業二初結前生後若諸二正顯智業何等二外得加持二初所離障佛子二能持之行二初佛所攝持二初結前生後若諸二正說法門何等二法所攝持佛子二明妙覺之果二明妙覺之果十初住天相四初標佛子二徵何等三釋十初化六欲天所謂二化色界天為色三化大千界菩薩四同類共談菩薩五為同類說菩薩六善巧降魔菩薩七樂音說法菩薩八諸佛聞法菩薩九供養多佛菩薩十多身益生菩薩四益佛子二示沒相四初標佛子二徵何等三釋十初廣拔眾苦佛子二徧警有緣佛子三嚴剎揀非佛子四覺諸導從佛子五密召侍衛佛子六先告當機佛子七令輔翼知佛子八淨所生處佛子九定力天壽佛子十廣現難思佛子四益佛子三入胎相四初標佛子二徵何等三釋十初為化劣解佛子二攝諸眷屬菩薩三三時無亂菩薩四演法益物菩薩五乘願化生菩薩六破胎生慢菩薩七胎障不隔菩薩八同類共集菩薩九定力現嚴菩薩十興供聞法菩薩四結益佛子四住胎相佛子五初生相三初右脇生佛子二示徵笑佛子三行七步佛子六在家相二初幻懷德藝佛子二貴極無染佛子七出家相二初示出家佛子二示苦行佛子八成道相五初進趣所安佛子二自力安處佛子三外感希奇佛子四正覺將願佛子五正覺現前佛子九轉法輪相二初所轉法輪體用佛子二轉法輪之因緣佛子十入涅槃相二初總明佛子二別顯初二七結勸分二初結義勸修二初舉名結義佛子二勸信修行佛子二結名勸學佛子八現瑞分說此九證成分二初讚法證爾時二歎人證佛子十重頌分三初歎德深廣四初許說深廣爾時二舉德誡聽見諸三重總許說千萬四示說分齊無量二總示行德三初略標法喻其心二託事表法十初悅物覆蔭行菩薩二摧邪導迷行菩薩三高深堅密行菩薩四觀機照益行菩薩五自在統御行菩薩六包含無染行菩薩七周徧成益行菩薩八檢束修身行菩薩九調御運載行菩薩十外用遊處行菩薩三即法明行二初總明深廣許說分齊三初上同佛覺菩薩二下超群品菩薩三許說誡聽如是二別明深廣以酬前許十初三業深廣行一身二二嚴無礙行菩薩三逆順成滿行示現四普門示現行或現五時處圓融行深入六知根說法行菩薩七寂用迅速行雜染八悲不失智行譬如九智不失悲行觀色十結德無盡行由入三頌長行二初頌前說分六初頌十信行依於二頌十住行發於三頌十行行住持四頌十迴向行如寶五頌十地行諸身六頌圓滿行所行二頌結勸分四初結前所說彼諸二別顯德用二初結約法顯行五初於剎自在雖令二三業自在無量三三世自在過去四身智自在深知五總結難測示現二結託事表法淨戒三總結深廣二初結前已說此諸二未說難窮一切四結勸修行欲具
