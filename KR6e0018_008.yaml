body:
  text: 清涼山大華嚴寺沙門澄觀述佛不思議法品第三十三四初來意二初標佛不二釋二初通二初正明通則二解妨二初問若答二答由因二別別明二釋名二釋三宗趣二初總三宗二別三初通辨佛德別就二別顯義相三初正顯二德二別二四句融通此二三揀權異實二初明權教若權二顯實教依此三顯不思議三初泛舉法體三顯二別語此經四初何者不思議就後二於何不思議二於三云何不思議三云四何用不思議四云三結歸宗趣前並四釋文四初請分二初先明請人爾時二正顯所念三初略示法體諸佛二對前相攝三初前開此合然此二前合此開前境三無開無合音聲三指前釋相此十二加分三初明加因爾時二顯加相則以三加所為令青三證分二初自分爾時二勝進於一四說分二初承九總告承佛二正顯佛德三初標示佛子二敘昔昔以三正顯三初略釋今謂二正科文分三釋文十初有二門答國土問二初明其常住法界二初標今初二釋釋中二明其徧住法界三初標佛子二列何等三結佛子二有二門答本願問二初明承願不失佛子二明願不失時佛子三有三門答種性問二初雙明報化種性佛子二唯明法身種性佛子四有二門答出現問二初明徧現常現佛子二明出現之相佛子五有五門答佛身問五初總顯無過佛子二明過不生佛子三身之業用佛子四智慧相應佛子五業用無斷佛子六有二門答音聲問二初明音聲辨說佛子二明種種說法性佛子七有三門答智慧問三初明智慧最勝佛子二明智慧離障佛子三明智慧成益三初標佛子二列十初相好身何等二圓滿音一切三功德一切四放光一切五微笑一切六法身一切七常光一切八妙色一切九真應一切十悲心一切三結是為八有八門答自在問八初總明自在二初總佛子二別十初法自在何等二心自在一切三解自在一切四財自在一切五命自在一切六如意自在一切七智自在一切八業自在一切九生自在一切十願自在一切二圓滿自在法佛子三善巧方便三初總佛子二別十初言說自在一切二知見自在一切三示現自在一切四三世自在一切五性相自在一切六調生自在一切七時分自在一切八辨才自在一切九勝義自在一切十寂用自在二初知寂二初正顯一切二釋成然亦二知起用而能三結佛子四廣大佛事三初總佛子二別二初徵何等二釋十初上生佛事四初別明能攝所謂二所攝廣多攝取三能攝殊勝大慈四所攝成益或令二降神事二初智德內圓佛子二神通外用二初明一處一時作佛事受最二總攝時處佛子三現生佛事二初無生現生佛子二無染處染四初三學自圓一切二四心愍物觀諸三具德攝益具佛四攝益深廣雖處四出家佛事二初出家意佛子二出家相當出五成道佛事三初真覺舊圓佛子二應身今滿菩提三演法益主其菩六轉法輪佛事二初列佛子二結一切七威儀佛事四初別舉入城佛子二威儀益物一切三言談示現一切四總結深廣一切八起行佛事四初身心安住行佛子二起應上求行或以三說嘿下化行或時四時分修進行或住九起用佛事二初顯用所依佛子二正明起用或現十涅槃佛事三初涅槃悲戀益佛子二舍利流布益復為三總結益滿佛子三結佛子五無二自在法佛子六住一切法佛子七知一切法盡無有餘佛子八廣大力三初標六初總科佛子二融通是則三敘昔古德四辨違則令五遮救設欲六正釋十中二徵釋二初徵何者二釋十初身命不可壞九二初正明不壞所謂二舉況顯勝若有二毛孔容持力佛子三毛持大山力佛子四定用自在力佛子五常徧演法力二初明一身轉三初顯說多佛子二所說常如是三所說體所謂二明多身轉如一六德相降魔力佛子七圓音徧徹力佛子八心無障碍力二初無塵惑障碍佛子二起用無障碍於不九法身微密力佛子十具足行智力四初萬行圓淨佛十二智用周圓住佛三動寂自在雖已四用無涯畔佛子三結佛子九有三門答無碍問十有三門答解脫問九有三門答無碍問三初所作無碍佛子二令他無碍佛子三念持無碍佛子十有三門答解脫問三初智障解脫佛子二定障解脫佛子三業用解脫佛子如來十身相海品第三十四四初來意如來二釋名四初釋名二釋二辨類二初正明觀佛二料揀三初約乘料揀三中二約身料揀又初三約機料揀又初三辨體若語四辨因若語三宗趣三宗四釋文三初告眾許說爾時二正陳相狀三初科判三初總科第二二料揀或略三大科二初成經次細論二明大科今以二釋文十八初依頂相三初約處總標佛子二別列名相三初正明圓融二別二辨其通妨二初問若爾二答三初正答顯頂二引證善生三通難此約三正釋本文其中三總結為嚴佛子二眉間有一相佛子三眼有一相如來四鼻有一相如來五舌有四相三初廣長舌相如來二舌掌之相如來三舌端之相二初卷如來二展如來六上齶有一相如來七牙有四相二初右輔二初下牙如來二上牙如來二左輔二初下牙如來二上牙如來八齒有一相如來九唇有一相如來十頸有一相如來十一肩有五相二初右二第一如來第二如來二左三第一如來第二如來第三如來十二胷有十一相三初當中一相如來二右五吉祥三左五吉祥十三手有十三相三初九直語手相二初前五明右如來二後四明左如來二二左右指如來三二左右掌如來十四陰藏有一相如來十五坐處有二相如來十六陛有二相如來十七腨有三相如來十八足有十三相七初足下一相如來二足上二相如來三足指間二相如來四足跟二相如來五足趺二相如來六足四周二相如來七足指端二相如來三料揀四初總辨名數上來二正明立理既不三重以理成況此四遮其傍救晉經三結略顯廣佛子如來隨好光明功德品第三十五四初來意如來二釋名二初得名二釋二釋名如來三宗趣三宗四釋文二初略二初正標果好爾時二舉因對顯二初光照分齊佛子二光所成益二初先令離苦淨宿善益彼世二轉報生天得聞法益三初示宿因從彼二顯其緣毗盧三結屬果於彼二廣二初廣淨宿善益佛子二廣聞法之益六初略標勸誨既生二聞已生疑爾時三總示所因是時四正明勸教四初以己喻佛無我無來諸天二以他喻己顯來即無來諸天三以己況佛難思之境諸天四正勸往諸誡不應留二初總誡勸諸天二廣釋二初釋前誡著五二釋前勸六初順釋諸天二反釋諸天三示其恩相諸天四勸往增善汝等五示法令修諸天六勸修成益汝等五依勸詣佛五初献供不遇時諸二聞其所在時有三觀見下生時諸四發心欲住諸天五教見佛儀二初教識受生令捨曲見三初法二初戒其因見時天二示其正見但以二喻諸天三合菩薩二教發心悔過令其得見二初標科意二初標章第二二釋相二初明所治之病夫欲二明能治之藥次起二依科釋三初總標教誨四初明懺依諸天二明懺體淨治三明滅非悔除四令皆盡以盡二徵問其方時諸三如法正教二初發聲之因爾時二正明教誨五初別觀業空諸天二總觀四障二初喻諸天二合諸佛三別破見惑三初鼓無生滅喻諸天二聲無去來喻諸天三鼓聲隨心喻諸天四對業觀報二初鏡像體虛喻諸天二幻師惑眼喻諸天五總結懺益若如六明見獲益二初辨餘眾益說此二辨當機益二初一重益二初得法益爾時二見佛益三初明見因以眾二正見佛即見三敬心供爾時二展轉益二初聞香益三初法其諸二喻譬如三合二初明所滅二初明第一解若有二明第二解二有二明能滅了知二見蓋益二初正明得益二初通釋金網三初引言晉經若有二牒今經而言三引瓔珞三初引瓔珞準瓔二成晉經若順三成今經二初釋順晉經若然二釋順今經若取二別釋恒沙言一二攝化轉益二初得位益三初法佛子二喻佛子三合菩薩二成德益二初喻佛子二合二初正明得益菩薩二顯境分齊三初假設喻以顯境多三初一重廣大佛子二問答顯廣寶手三重顯廣大寶手二正明能見如是三結德有歸寶手普賢行品第三十六四初來意二初通二初正明普賢二解妨二初敘妨若爾二釋通二初出所以答二初總答即以二別答若更二經來未盡又前二別二初就因果明別謂二對前問答二初正對前問亦遠二解其妨難三初正答前雖二引例亦猶三重通而妙二釋名二初通二品義名二初約平等釋二釋二約出現釋因果二別釋品名二初總釋品名別則二別釋普行三初標舉然普二釋相一所三料揀二初總名融通上之二約位重揀二初正揀會釋又上二結彈異釋若獨三宗趣二初通三宗二別別以四釋文二初長行二初正說二初明說因二初標前略說爾時二徵釋所由二初徵何以二釋諸佛二陳今義二初明所治廣多三初總標佛子二徵釋二初徵何以二釋二初總顯佛子二別顯四初略標舉何等二敘古釋古人三辨順違此釋四成正義又所三結成佛子二辨能治深妙二初正顯六初十種勤修二初標舉勸修是故二徵數列結何等二十種清淨二初躡前起後佛子二徵數列名何等三十種廣大智佛子四十種普入佛子五十種勝妙佛子六十種善巧佛子二結勸佛子二瑞證二初現瑞證二初舉此界爾時二以結通如此二菩薩證二初舉此土爾時二以結通如此二偈頌二初敘述二初說儀爾時二說意欲開二正顯二初二十四頌顯說分齊二初一誡聽許說汝等二正示分齊二初九頌頌許說過去菩薩之行往昔二餘頌頌許說三世佛菩薩行二初舉所說時處二初二舉時於一二一舉處如一二明所說之行二初四諸佛出世之行諸佛二七菩薩二輪願智行入於二九十七頌皆約正辨二初六十七頌即悲大智行十於一二三十頌即智大悲行十未安如來出現品第三十七四初來意如來二釋名三初正釋四初總釋所以二釋二結前生後如來三別釋三義若依四融通會釋二初會三身三初法報相對今以二真應相對無不三結融三十三佛二會品名二初會晉經二初總標示是以二釋性起以應二會今經今以二彈古若唯三會釋若以三宗趣第三四釋文七初加分二初毫光加請主三初光十初出處爾時二名體放大三因業無量四舒業其光五敬業顯現六覺業覺悟七正業除滅八降伏業暎蔽九示現業顯示十卷業作是二加相入如三益二初大眾其欣時此二妙德領旨二初長行致敬爾時二偈頌讚請二初五頌讚二初一總讚申敬正覺二四別讚放光已升二五頌請五初自敘得益導師二領眾意請決定三歎眾堪聞今此四敘佛令請利益五正求說主誰於二口光加說主三初光爾時二加入普三益其光二本分三初徵事而問爾時二引例以答普賢三表瑞證成說是三請分二初長行四初總舉法請時性二歎眾堪聞佛子三歎說主具德佛子四標章別請善哉二偈頌三初一偈讚德別請時如二四偈舉法別請菩薩三五偈歎德勸請四初一偈總讚以請此謂二二偈勸說之方願以三一偈半歎眾堪聞十方四半偈結請所說願以四說分二初別答十問十初答出現之法二初長行二初標告歎深爾時二隨義別顯三初法說深廣酧前因緣三初標所謂二釋二初徵以總釋何以二徵數別釋何等二喻明深廣雙酧因喻十初大千興造喻三初喻四初總辨多緣佛子二別辨緣相所謂三顯彼因起如是四性相結成佛子二合如來三結佛子二洪霔大千喻復次三雲雨無從喻復次四大雨難知喻復次五大雨成敗喻三初喻復次二合佛子三結佛子六一雨隨別喻復次七勝處先成喻二初正明復次二釋疑佛子八事別由因喻三初喻三初蓮華表佛復次二