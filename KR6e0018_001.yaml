body:
  text: 清凉山大華嚴寺沙門澄觀排定釋此華嚴經八十卷三十九品大文分二初經前演義三初經疏總題大方二述人名號清涼三正解疏文四初總敘名意即是疏序亦名教迹二初大分為四初通敘法界以為佛法大宗隨疏二別敘此經以申旨趣二剖三慶遇由致激物發心是以四略釋名題令知綱要四題二細科為十初標舉宗體四初約三大釋五初句用大往復二明體大二動三明相大三含四融拂上三四超五結法所屬五其二約本末釋五初句從本起末第二二攝末歸本次句三本末無礙第三四本末雙寂第四五結通四義末句三明法界類別三初約三法界五初句事法界第三二次句理法界次句三無障礙法界第二四融拂上三第四五結屬上三第五二約四法界五初句事法界二者二次句含三法界動靜三事事無礙法界含衆四融拂上四超言五結屬上四其唯三約五法界四初二句融四法界三初往復動二字有為法界三者二靜之一字無為法界靜無三一源二字分二初互奪雙亡非有為無為法界一源二互融雙照亦有為無為法界若互二第三句無障礙法界含衆三第四句總融五法界超言四第五句結屬五法界其唯四總彰立意疏外問答第四二別歎能詮四初總明能詮剖列二別顯深廣窮理三結歎深廣汪洋四結法所屬其唯三教主難思四初標果滿故我二語因深乘願三明體玄渴虛四彰德備富有四說儀周普七初所依定湛智二能應身皎性三說經之處不起四說經之時無違五所被衆盡宏六說本經圓音七敘說儀主伴五言該本末二初理事相望論本末雖空二諸教相望論本末若乃六旨趣玄微二初理事無礙二初示三大其為二融真妄二初正明雙融真妄二不礙雙存事理二事事無礙二初明無礙所由理隨二顯無礙之相十初明諸法相即自在門故得二廣狹自在無礙門廣大三微細相容安立門炳然四同時具足相應門具足五一多相容不同門一多六祕密隱顯俱成門隱顯七因陀羅網境界門重重八十世隔法異成門念念九託事顯法生解門法門十諸藏純雜具德門萬行七成益頓超二初總顯高深二初明廣遠若夫二彰深妙深不二正顯成益八初見聞益見聞二解行益解行三頓證益師子四超權益象王五成智益啓明六成位益寄位七顯因成果益剖微八成就行願益蓋衆八結歎宏遠二初當相顯勝真可二對他顯勝二初法尋斯二喻二初智明映奪喻文有二高勝難齊喻後須九感慶逢遇二初弘闡元由是以二正明感遇二初對昔自慶願惟二對今自慶况逢十略釋名題三初雙標二目題稱二雙釋二目二初解經題大以二釋品目佛及三雙結二目斯經二歸敬請加三開章釋文四謙讚回向二正解經文二歸敬請加三初八句正歸敬三寶二初句總明歸命二七句別顯三一初歸依佛寶座剎二歸依法寶三一三歸依僧寶三一二六句請威加護三初請歸之意第二二願加護相次願三著述所為三俾三二句回施衆生回茲三開章釋文二初標列章門將釋後依章別釋十初教起因緣二初生起大意三初正釋三初法初因二喻次若三合後今二引證言故三釋如言出二開章別釋三初雙標先因次雙釋二初釋因十義三初標列因十二別釋十初法應爾故四初正釋言法二引證故不三結釋斯則四解妨二初正解但隨二重通再難三初法令尋次喻如觀後合二初正法合而此後釋成上義以一二酬宿因故五初標章門二酬二躡前起後何以三標因深廣夫根四釋成深廣深大五開章別釋二初標章宿因二別釋二初大願力一者二昔行力二者三順機感故六初標章三順二躡前起後謂昔三約喻顯相其猶四引經證成故兜五指略在廣廣顯六揀定於機然此四為教本故三初標章四為二總彰大意二初立理謂非二正釋將欲三開章別釋三初為開漸本然亦次為攝末本二初標名二為後義證如日後雙證上二二初引攝論無不二引法華二初正引經文法華後結成本義斯則五顯果德故二初總彰大意三初法五顯二喻不識三合不知二開章別釋二初正釋然果二融通三初約用互在以明六句然依二約體相相即以明四句又有三雙結體用隨舉六彰地位故二初彰大意二初順明來意六意二立理反成夫聖二開章別釋三初正釋二初行布此亦二圓融二初正釋二初一位即攝一切位二圓二別明五位相攝一一二引證三初約當位自互相攝初地二明五位互攝二云三明以初攝後三初二會融二初辨定其相然此二正明會融三初一翻直明無礙相是二二翻則互相成圓融三三翻融通涉入無量三引正故世七說勝行故二初總舉大意七說二開章別釋二初以義別釋二初頓成二初正明行亦二引證故十二行布二遍二指例會融此二八示真法故二初總明八示二正釋此亦九開因性故二初總彰大意二初躡前起後九開二總相解釋三初總明因義良以二覆彼因義但相三正明開義今令二開章別釋二初開釋亦有二後引證二初引自經如下二引他經亦如十利今後故二初躡前總辨十利二開章別釋三初就時辨益此亦二約行辨益二初令得見聞為堅種此益二令起行證入二初正釋二令二釋成良以三對前辨益二初通收十益又此二通申本義亦可三結屬會釋因十二釋緣十義後雙結教起二藏教所攝三義理分齊四教所被機五教體淺深六宗趣通別七部類品會八傳譯感通九總釋名題十別解文義二釋緣十義二初引例總明第二二開章別釋二初標列章門今有二依章正釋十初依時文分四初大意二初佛迹顯實今初二就德顯圓况無二開釋三初標今以二釋初唯三結於前三會融三初正融會又此二通妨難二初難依此二通亦隨三顯勝能三初對他顯勝若依二會他顯勝而餘三再通妨難或說四出法之源廣如二依處四初總彰大意三初拂迹顯實第二二融通顯圓况剎三依義建立然真二敘昔順違二初正敘然有二決斷上之三句數圓融三初雙標然說二雙釋二初釋染淨二四句二初本末相望四句初淨後唯就一剎四句又或後釋通局二四句二初標次明後釋二初平漫四句謂或後相攝四句又或三以粗例細又以四別明處異六初標數若從二別釋初此三總結然上四釋妨三初總答前問然說二重通再難若約三以一例餘一一五隨難重釋二初正顯同遍十餘二釋通妨難然主六總融十義三初正顯十義融通又上二對時顯處而隨三通顯甚深此猶三依主文分五初總彰大意第三二假難徵起二初問起今說二徵難二初難真應若言二難一多若云三總相會通二初遮非故說二顯正三初總相顯示即是二對難會融二初雙標真應二雙釋二初釋真應二初唯釋真應即虛二正明真應兼顯一多常在後釋一多二初唯釋一多身不後正釋一多兼該真應同時三結成難思一切四開章別釋三初標章今先二解釋二初明十身二初三世間十身言十二佛身自有十身二就二彰無礙二初標數言無二列釋十初用周無礙一用二相遍無礙二相三寂用無礙二寂四依起無礙四依五真應無礙五真六分緣無礙六分七因果無礙七因八依正無礙八依九潛入無礙二初標章九潛二解釋二初佛入衆生三初正釋入衆二引喻如如三引證故出二衆生入佛又亦十圓通無礙二初別明十圓二總結同一三總結周遍以此五會通餘教三初別會五文五初會起信唯識是知二會涅槃央掘或說三會通梵網或說四會他受用或說五通會三身或分二總非俱非三揀濫設分四依三昧二初立理正明二初別顯第四二結成故於二指文略釋有不五依現相四初總明大意第五二顯相不同起教三別明放光三初總明故諸二別顯然有三明隨處放異隨處四料揀同異其動六依說者二初總顯來意二初立理第六二引證下文二開章別釋三初總明說人四初明有三今此二開為五開即三開五為十更開四開十為無量廣即二指文顯說如僧三說儀不同其能七依聽者二初總明大意第七二略指類別即下八依德本三初標大意第八二正顯示略有三揀濫若感九依請者二初舉無顯有第九二別示請儀然有十依加者二初總明大意二初立理第十二指陳心冥二別釋所以四初總彰有無然若二出加所以二初徵所以二釋欲顯三釋通妨難三初徵難若爾二釋難表徵三遮難然施四就類彰別二初別顯加有二指文普光二藏教所攝二初明藏攝二初明藏二初總科第二二別釋二初釋三藏三初總列三名言三二別釋三藏三初修多羅藏二初辨名四初會梵音初中二敘古譯五初標名古譯二引證智論三釋義契謂四會六釋即契五會傍正復云三敘古破有云四會順違三初伸全縱今更二彰半奪若兼三出古意古德二顯相三初總舉包含二顯二正會五義故雜三以義貫通二初總釋貫通三初標義總上二引證故佛三釋所引論此或二彰所貫攝二初引論正釋二初引論總標又世二引論別釋依者二例同指餘瑜伽二毗奈耶藏二初標科第二二別釋二初辨名二初正釋前中二辨異四一名毗尼毗尼二名尸羅或名三名波羅提木叉亦名四名性善及守信亦名二顯相二初指前總說後顯二引證別說若別三阿毗達磨藏二初總標第三二正釋三初辨名二初得名二初釋法阿毗二釋對二初釋對義法既二出對體其能二釋名言對二顯相二初總標世親二別釋對義三異名亦名三總顯所詮然比二釋二藏四初總標第二二別釋即由三引證故莊四出其所以三初正出為二所以此就二出三乘三藏不同若約三重成二藏之義又此二明攝分二初明彼攝此第二二明此攝彼若約二明教攝二初總標第二二別釋二初明通相十二分教一者二別明諸宗立教三初標舉將說二者二總顯深廣三初標深廣夫教二釋所以以無三結難思極位三開章別釋二初標章門今乘二依標釋四初大意合離三初雙標開合今初二雙釋開合二初釋不分之意三初總標且不二列釋一則三總結以斯二辨分教之意二初五對前五義其分後五顯過於前又王三雙結開合以斯二古今違順二初敘此方二初總列第二二別釋五初立一音教二初敘昔義一立二辨順違上之二立二種教四初曇無讖三藏二初敘第二二判斯則二隋延法師二初敘二隋二判此雖三唐初印法師二初敘昔三初總標三唐二正立一屈三揀異又此二辨順違二初順三初總出立意此約二遮破釋成二初救總名然華二救四異二初通主異約釋二通處異娑婆三結成昔義略云二違但於四劉虬居士二初敘四齊二判二初順然此二違漸約三立三種教二初總標第三二別釋三初南中諸師二初敘昔二初總明三初正立一南二辨立意由故三出不定相謂別二別明漸義二初總標漸中二別釋四初分為二或但二或為三二初一師正立或分二後二師指同二初唐三藏指同初師此與二真諦指同別立二初指同初師真諦二指異別立而時三或為四二初標或分二顯即宋四或為五二初總標或開二別釋二初道場惠觀等同立五教一道二劉虬居士亦立五教二者二順違三初總明順違上來二別破違理二初破道場五初破初時唯有四初小乘論破初明二引小乘經破又阿三引大乘論破又智四結上三文皆顯二破第二時唯空三初破其說空二初引制戒若云二引論破又智二破不明常住四初返質破若云二顯正破涅槃三會義破是知四縱奪破又般三結立正義是知三破第三時抑揚二初雙標若云二雙破二初引淨名破淨名二引般若破般若四破第四時唯同歸若云五破第五時唯常住五以二破劉虬若以三結成違順然上二後魏光統律師二初明承習二後二顯立義二初