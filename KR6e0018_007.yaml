body:
  text: 清涼山大華嚴寺沙門澄觀排定起第三十七經盡諸菩薩住處品七遠行地分七初來意二初正釋第七二引證瑜伽二釋名三初標言遠二釋成唯三結雖有三斷障二初躡前然其二正明故所四證如二初舉能治以常二辨所證故能五成行以能六得果乃至七釋文三初讚請分二初十偈讚四初二頌天衆讚説主是時二一頌天主光雲供佛自在三有一頌天衆慶聞爾時四有六頌天女樂音讚佛二初一顯聲因緣天女二五正説讚辭二初四寂用無礙威儀二一起用所由以見二二偈請一切二正説分二初位行五初樂無作行對治差別四初結前標後六初略屬經文爾時二別釋方便慧殊勝謂前三釋其二名是則四明其所勝於何五解相濫難前六六所治名局難雖行二徵顯其相二初總釋上下二句何等二次第別釋二初別釋前三論主二合釋後七三初一隨物受生後七二二化令離障二説三四攝令住善四於三結行功能菩薩四彰其分齊入已二彼障對治差別二初明行無量種治前有量障五初有一對衆生無量佛子二有一對世界無量入無三有二對法界無量入無四有三對調伏衆生界無量入無五有三對調伏方便界無量入無二修行無功用行治前有功用之障二初加行趣求四初略釋經文此菩二示無功用相然任三出無功用因由功四結成揀異此則二正顯修行佛子三雙行勝差別四初二行雙無間無有二信勝常不三能作大義二初總明此菩二徵釋二初徵何以二釋二初明能具所以念念二顯所具之相二初通辨前六所有二別明後四能出四菩提分差別四初明第一句佛子二明第二句二四三明第三句七初揀後所知三四二顯淨惑要謂依三揀非勝進任持四釋成家義亦名五釋四體相四者六結成四義由初七約位分別若約四明第四句四略四前上地勝差別二初明勝前六地二初問爾時二答三初標金剛二徵何以三釋二初別顯此地勝相此第二通示諸地滿相三初總示文意佛子二舉論徵釋故論三正辨經文初地二明勝後三地四初法二初徵何以二釋菩薩二喻佛子三合佛子四因論生論二初問解脫二答二初通將七地對後彰劣三初法金剛二喻佛子三合佛子二別明此地對前彰勝二初明起過二初總釋佛子二明所超二初約所求道即所知障前求二辨超煩惱即煩惱障又初二辨雙非次住五彼果差別五初釋總名佛子二開章門文分三辨所從遠公四辨雙行又初五正釋文四初業清淨四初戒清淨就初二世間智淨世間三得勝身此菩四得勝力諸禪三得三昧勝二初別舉十名二初五句辨自利佛子二五句明利他二初一行辨深善住二明體行三初一助道智慧二二證道法界三一不住道種種二總結顯多入如三得過地三初修行善巧過是菩二作業廣大過二初正顯其過佛子二彰過分齊二初難即執前同後難解脫二答即揀後異前答三初法金剛二喻譬如三合菩薩三修行勝入過佛子四得勝行二初得滅定勝行在定不住故二初問解脫二答二初明得分齊金剛二辨勝過劣三初法今住二喻譬如三合此地二發起勝行二初牒前標後佛子二正顯勝行二初總相通辨後雖二對文別釋二初七別約七行八中二三合為一行八者二位果經科八段同前後例三重頌分三重頌分三初頌位行五初樂無作行對治爾時二彼障對治觀察三雙行無間菩薩四頌前上地勝初地五頌雙行果世間二頌位果供養三結説讚勝此是八不動地七初來意二初約實位第八二約寄位又約二釋名二初舉論言不二疏釋八初疏文正釋謂任二以本論釋與本三金光明經而金四引攝論釋攝論五引深密釋解深六十住論釋十住七仁王經釋仁王八引當經釋下經三斷障故所四證如其所五成行所成六得果及所七釋文三初讚請分二初十讚二初二天王衆供讚是時二八天女樂音讚二初二標讚所依天女二六正顯讚德於一二二請音發二正説分二初明地行七初總明方便集作地分二初標集地處爾時二正顯所集二初三同相諸地通行故善修二八別相諸地異修故大願二得淨忍分二初敘意分二初總科入一二就類明忍然無二釋文分三初正明無生法忍七初釋總句今初二總科以歷三顯功能四中四約位若寄五出體又四六指廣依佛七隨文釋四初約事無生分二初總事無二別二初釋前四二初別明別言二結束二初約三佛性上四二展轉收束又此二釋後三五先二自性無生分三初會二經無性二釋經文無性三會中道斯則三數差別無生分二初正明初中二揀濫然準四作業無生分二初正明無分二總結如是二明無生忍淨二初釋所離障二初單釋離字離一二雙辨所離所離二釋能治分三初結前生後後無二彰立所以所以三別釋文相二初釋治義故云二以起信總收上義此則三一結得忍名是名三得勝行分四淨佛國土分五自在分六大勝分七釋名分二明地果三重頌分三得勝行分二初明深行勝對前彰出二初結前生後佛子二正顯深行二初法二初隨文釋為深二收束治障上七二喻三初滅定喻二初釋喻譬如二釋合三初正合本文合中二結成離過離第三釋對治二初約教道住於二約正道五初舉論二者二引例按定此約三明所離即離四釋經報行報行五重釋論二初明初意住真二明後意又佛二夢寤喻五初舉前所喻譬如二顯喻意論云三釋喻相如從四釋合文合中五會通喻合如彼三生梵天喻五初舉所喻佛子二釋合文合中三釋論所以所以四所離過患此離五別釋後此二發起勝對後彰入四初説主總敘佛子二正顯勸辭二初讚作如二勸七初勸修如來善調御智自德未成勸然善二勸悲愍衆生化願未滿勸又菩三勸成其本願本願未充滿又菩四勸求無礙智自德未勝勸又菩五勸成佛外報化業廣大勸又菩六勸證佛內明無量勝行自己所得法門未窮又菩七勸總修無遺成遍知道少作能成增進衆德又菩三顯勸所為佛子四彰勸之益二初明不勸之損故不得不勸二初敘四意須勸佛子二例深故勸但有二彰勸之益是故須勸三初法三初牒前與智彰益之因以諸二明起行速疾於一三速疾所由三初通料揀何以二隨句別釋十中三一句總結後一二喻佛子三合佛子四淨佛國土分二初敘意二初問大文二答二初開二門答淨二揀定今約二釋文三初器世間自在行二初總標舉佛子二別顯相五初隨心欲所謂二隨何欲由此三隨時欲幾時四隨廣狹欲三初知四大差別即是廣相又知二知狹相知微三雙明廣狹相二初總知內外隨何二別明六道知地五隨心幾許欲二初約智知自在又知二約通明自在三初隨機現化佛子二明化分齊此菩三明現自在此菩二衆生世間自在行三初總明感應佛子二別顯感應二初化同物身所謂二化應物心又應三總結感應佛子三智正覺世間自在行二初明第一義智佛子二明世諦智三初總知十身三初依論總科此菩二釋論分字皆言三依科釋經三初三明染分染中二六明淨分次六三一明不二分後靈二十身相作顯通自在分二初別顯相作此菩二總結例餘隨諸三別顯知相彰智自在分八初知衆生身此菩二知國土身又知三知業報身知業四知聲聞等三身知如五知佛身知如六知智身知智七知法身二初通料揀知法二別釋文文有八知虛空身知虛五自在分二初牒前為因佛子二顯自在果三初別釋經文得命二通釋自在於此三明其所治三初舉論論以二會五怖畏次此三會通行位約因六大勝分三初智大得此二業大三初二句牒前為因此菩二正顯業大得畢三總結多門佛子三彼二所住功德大三初標所住分齊佛子二顯所住德得菩三結成功德此菩七釋名分二初釋地名即約法明位三初總科判佛子二依論釋言為三順經釋今更二智者釋名約人彰德三初牒前為因佛子二正就人顯二初總明入佛二別釋二初明一向不動常為二一體不動佛子三總結所住於無二明地果三初調柔果四初調柔體三初法佛子二喻譬如三合此地二教智淨佛子三別地行相此菩四結説地名是名二攝報果二初上勝身佛子二上勝果復作三願智果若以三重頌分三初頌位行七初集作地分爾時二頌得淨忍聞法三頌得勝行二初頌深行勝成就二頌發起勝以本四淨佛國土三初頌器世間心無二頌衆生世間三千三頌智正覺世間菩薩五頌十自在十種六頌大勝分所有七頌釋名分諸佛二頌位果復以三結説分齊菩薩九善慧地七初來意第九二釋名言善三斷障故所四證如故所五成行便成六得果梁論七釋文三初讚請分三初二如來現相説此二十頌別讚三初一頌菩薩供菩薩二一頌天王供大自三八頌天女供讚二初一供復有二七讚二初一標讚是時二六顯辭二初二讚菩薩通於八地及説法主寂靜二四雙讚佛及菩薩三輪化益不離三一頌結請如是二正説分二初明地行四初法師方便成就三初牒前起後爾時二正顯方便三初二句通顯二利欲更二五句利他三依三三句自利下三三結行入位得入二智成就二初總知三性佛子二展轉別開有漏三入行成就三初總標章門二初隨文釋二初句是總此菩二十句別二初二句通總別餘十二七句別四初總釋七林論釋二重釋根等論又三例三聚若相四會二名殊論經二釋總名三初正釋稠林十皆二重釋二經論經三指廣辨異然此二依章別釋九初心稠林此菩二煩惱稠林三初總標又知二別釋三初遠入相一遠二難知相二無三染相二初總釋三俱二別釋三初三句當體明煩惱三初明所縛初三二辨以何縛二眠三所縛事三與二二句約生明煩惱二隨三二句約業明染三愛三結結中三業稠林三初總又知二別九第一道因差別初一第二自性差別二有第三方便差別三與第四盡集果差別四因第五已受果未受果差別五有第六能對差別二初列黑黑二初舉論別釋對六黑二論自別釋二初釋黑黑言黑二通釋餘三等者二明衆報言衆第七因緣差別七如第八已集未集差別八凡第九二句明定不定差別二初標章九十二釋義二初明第九句三初舉論前句二釋文謂現三釋論定不定義二初標於此二釋謂前二明第十句第十三結結中四根稠林又知五例三稠林又知六隨眠稠林二初總釋又知二別釋二初總科別有二正釋二初六句明何處隨逐今初二有六句明以何隨逐二初總明後三二別釋此有七受生稠林又知八習氣稠林二初總四初雙標又知二引證雖標三正釋二初釋名薰謂二釋熏習三初法相宗即賴二法性宗若依三通揀濫前中四結通今並二別二初當句釋別中二總結束上來九三聚稠林二初總二初舉論又知二疏釋三初正出有無無即二揀定此就三揀法相宗又約二別二善三總結安住佛子四説法成就二明地果三重頌分四説法成就二初牒前總顯住此二別顯説成三初智成就二初隨所知之法佛子二隨所依之器三初總明一切二別顯二初辨能説之行別中二辨所為之器五亦三結益三結二口業成就二初總明具説之德二初總釋大意佛子二釋文二初引本論何名二引他文三初引涅槃涅槃二引瑜伽慈民三會同異會之二正明口業成就二初略明三初總顯名體以無二約位顯勝次此三徵列名字二初釋通名後何二釋別名四初法無礙一法二義無礙二義三辭無礙三詞四樂説無礙四樂二廣明二初文前敘意三初總釋二廣二列名略釋言十三總就十中釋無礙義然十二依文正釋十初依自相三初總標此菩二別釋一生三總結此自二依同相二初總釋法義復次二一一別辨一一三依行相復次四依説相復次