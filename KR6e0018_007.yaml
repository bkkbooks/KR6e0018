結是名七如響忍三初徵佛子二釋三初忍行所因佛子二成忍之相二初法二初指法同喻知一二了見佛聲佛子二喻四初喻況譬如二合法而與三轉喻如帝四重合菩薩三忍成之益二初隨機遍説此菩二權實雙行雖知三結是名八如影忍四初標佛子二釋三初法三初七對雙遮顯性以成止行佛子二二對雙照性相以成觀行非修三二對遮照無礙成雙運自在行雖常二喻五初明所依本質二初揀所喻通局譬如二揀能喻通局其河二明能現之處二初通辨文旨於油二別開喻旨三初水月喻然此二光影喻二以三影像喻二初正屬經文三以二對喻辨異二初辨得報以鏡二辨前異前映三名緣之所起而現四明有之非有影與五明愚小為有然諸三合二初正合前文菩薩二轉以喻合如種三結是名四果三初約法性身菩薩二結成無礙然此三顯此身因此菩九如化忍四初標佛子二釋三初法二初總標佛子二別顯二初總顯所知二初五染化所謂二五淨化復有二別顯能知三初結前生後菩薩二正顯能知現證三結上六知非虛二喻譬如三合二初化行四初起化用菩薩二明化智不著三雙非顯中以本四結示化旨了法二化益佛子三結是名四果二初得利他業用之果菩薩二得自利立勝名果佛子十如空忍四初標四初所喻通局佛子二喻相不同四初唯將空喻對六喻然其二通辨七喻所破差別又此三重將空喻對前六喻又前四通辨七喻能所空局又上三引論會釋三初引智論之義然龍二引佛地十義及佛三引八地十義上八四結成大意三初總明然別二引證故睿三結成餘無二釋二初忍解之相二初別明佛子二總結菩薩二忍行成益三初總明得如空三業具佛子二別顯德齊虛空譬如三徵釋得益之由二初徵何以二釋二初智證齊空故菩薩二德用滿空故嚴淨三結是名四果菩薩二偈頌二初一百偈頌前十初頌音聲忍二初頌所聞佛説爾時二頌能聞佛法聞此二頌順忍如有三無生忍三初三頌標三十二四頌釋無滅三三頌結此忍四如幻忍二初六頌略説二初四頌指法同喻世間二二頌初行成就度脫二四頌廣説三初二頌頌喻幻作二一頌頌合菩薩三一頌頌成行衆生五如炎忍四初頌攝前生後如是二頌指法同喻勇猛三一頌喻況譬如四三頌合法衆生六如夢忍菩薩七如響忍四初之一偈頌忍行所因修行二二頌聞一切聲如響一切三二頌如來聲如響瞻仰四頌忍成之益善了八如影忍九初二頌非世生沒為欲二一頌不在內外不住三一頌非行不行了知四一頌非同非異世間五一頌非往非不往心不六六句頌非住非不住譬如七二句頌亦不在內外亦不八一頌非修菩薩行等入此九一頌常離一切法等世間九如化忍四初頌總標觀察二頌染化一切三頌淨化三世四頌法合知世十如空忍二初頌忍解之相第十二頌忍行之益三初頌別顯獲此二頌徵釋自住三頌總明智慧二七偈頌結歎二初三二利行圓如是二四顯深難測所修阿僧祇品第三十四初來意二初通辨阿僧二別辨二別二釋名二釋三宗趣三宗四釋文二初總辨此三品深奧玄微四正二通明因果超勝行絶二初明三勝德然此二問答分別二初問二初牒佛所説爾時二正明咨問世尊二答四初讚門成益佛告二戒聽許説善男三敬受尊命時心四正答所疑二初長行明能數之廣多佛言二偈頌所數之德無盡二初六偈明普賢德廣説不盡二初四頌半明能數多爾時二一頌半所數廣爾劫二餘偈明佛德深廣普賢窮究二初明果德無礙因位善窮二初明果法無礙二初三頌明依報自在一毛二明依正融攝五初依中現正於彼二正中現依二初明蓮華光於彼二現淨土用彼如三依中現正説法光中四現時常住或復五自在調生其心二明因位善窮二初結前生後菩薩二正顯因德十初明帝網身土是起行處一毛二明三業勤勇之行意根三明應器攝生之行一切四明遊方供佛之行普現五明廣修十度之行修行六遊剎自在行諸佛七調伏衆生行了知八三業深淨行一一九願智自在行彼諸十結德無盡行不可二明果德深廣因能趣入二初果三初總歎佛德不可二別明依報一微三別明正報一一二因二初自分行種種二勝進行能於如來壽量品第三十一四初來意二初立理如來二正顯二初近廣前品菩薩壽量上品二遠答初會唯如來壽量亦為二釋名二釋三宗趣三宗四釋文二初集法者敘爾時二明其正説三初別舉十剎相望佛子二舉略顯廣佛子三舉其玄極最後諸菩薩住處品第三十二四初來意三初廣僧祇諸菩二酬初會亦遠三敘異説昔將二釋名二釋三宗趣三宗四釋文二初結集者敘爾時二正明住處二初前十依於八方山海十初仙人山佛子二勝峰山南方三金剛炎山西方四香積山北方五清涼山六初略釋經文東北二彰其所表表我三定其方所然但四顯其靈聖二初略指諸文其由二自述所覩二初至山元由余幼二正敘見聞二初正敘見聞其感二略指佳境其山五徵其元由自大六勸物修敬二初引例勸修五天二正明勸意其有六金剛山海中七支提山東南八光明山西南九香風山西北十莊嚴山大海二十二處城邑雜居十二初毗舍離國毗舍二摩度羅城摩度三俱珍那國俱珍四清淨彼岸清淨五摩蘭陀國摩蘭六甘菩遮國甘菩七震旦國震旦八疏勒國疏勒九迦濕彌羅國迦葉十增長歡喜城增長十一菴浮摩國菴浮十二乾陀羅國乾陀
